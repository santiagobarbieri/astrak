<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <title>ASTRAK/title>
  <style>
    @font-face {
      font-family: 'Garet';
      src: url('./Garet-Book.woff2') format('woff2');
      font-weight: 600;
    }

    @font-face {
      font-family: 'Garet';
      src: url('./Garet-Heavy.woff2') format('woff2');
      font-weight: 900;
    }

    :root {
      --bg: #000000;
      --light: #ffffff;
      --gray: #808080;
      --accent: #e8e951;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }

    body {
      font-family: 'Garet', sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
      height: auto;
    }

    /* ── TOPBAR STICKY NAVEGADOR PILL ── */
    .topbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-pill {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      transition: all 0.3s ease;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text);
      opacity: 0.6;
    }

    .nav-pill:hover,
    .nav-pill.active {
      background: var(--accent);
      color: var(--bg);
      opacity: 1;
    }

    /* ── HERO HEADER ── */
    .hero {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #2a2a2a 0%, #0a0a0a 100%);
      background-attachment: fixed;
      z-index: 1;
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(232, 233, 81, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: min(90vw, 1400px);
      max-width: 100%;
      padding: 80px 32px;
      display: flex;
      flex-direction: column;
      gap: 80px;
      align-items: center;
    }

    .hero-nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .hero-brand {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero-nav-items {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .hero-nav-link {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.7;
      transition: opacity 0.3s ease;
      background: none;
      border: none;
      cursor: pointer;
    }

    .hero-nav-link:hover {
      opacity: 1;
      color: var(--accent);
    }

    .hero-nav-link.cta {
      background: var(--accent);
      color: var(--bg);
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 1;
      font-weight: 900;
    }

    .hero-nav-link.cta:hover {
      background: #d9dd41;
    }

    .hero-title {
      font-size: clamp(48px, 11vw, 90px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 1000px;
      text-align: center;
    }

    .hero-title .accent {
      color: var(--accent);
    }

    .hero-image-container {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }

    .hero-image-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(232, 233, 81, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    /* ── SECCIONES PRINCIPALES ── */
    .section {
      position: relative;
      z-index: 5;
      min-height: auto;
      width: 100%;
      padding: 100px 32px;
      background: var(--bg);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section-container {
      width: min(90vw, 1200px);
      margin: 0 auto;
    }

    .section-title {
      font-size: clamp(32px, 9vw, 72px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .section-title.accent {
      color: var(--accent);
    }

    .section-text {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.65);
      max-width: 650px;
    }

    /* ── MANIFESTO ── */
    .manifesto-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .manifesto-left {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .manifesto-right {
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .stat-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-number {
      font-size: 42px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .stat-description {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.55);
    }

    @media (max-width: 768px) {
      .manifesto-grid {
        grid-template-columns: 1fr;
        gap: 48px;
      }
    }

    /* ── CATEGORÍAS ── */
    .categories-content {
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
    }

    .category-badge {
      padding: 9px 14px;
      border-radius: 18px;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .category-badge:hover {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* ── BLOG ── */
    .blog-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .blog-item {
      display: grid;
      grid-template-columns: 50px 1fr auto;
      gap: 24px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.3s ease;
      cursor: pointer;
      align-items: start;
    }

    .blog-item:hover {
      border-color: var(--accent);
      background: rgba(232, 233, 81, 0.04);
    }

    .blog-number {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .blog-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .blog-type {
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .blog-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .blog-excerpt {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.5;
    }

    .blog-meta {
      font-size: 11px;
      color: var(--gray);
      align-self: start;
      white-space: nowrap;
    }

    .blog-loading,
    .blog-empty {
      text-align: center;
      padding: 48px 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ── FAQ ── */
    .faq-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .faq-item {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.3s ease;
    }

    .faq-item:hover {
      border-color: var(--accent);
      background: rgba(232, 233, 81, 0.04);
      transform: translateY(-2px);
    }

    .faq-number {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .faq-question {
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.3;
    }

    .faq-answer {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
    }

    /* ── CONTACT ── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .input,
    .textarea {
      padding: 10px 0;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      font-family: 'Garet', sans-serif;
      font-size: 13px;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .input::placeholder,
    .textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .input:focus,
    .textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .textarea {
      min-height: 90px;
      resize: vertical;
    }

    .submit-btn {
      align-self: flex-start;
      padding: 9px 22px;
      border: 2px solid var(--accent);
      border-radius: 18px;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Garet', sans-serif;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 6px;
    }

    .submit-btn:hover {
      background: transparent;
      color: var(--accent);
    }

    .status-msg {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.05em;
    }

    .contact-side {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .contact-note {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-note strong {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .contact-note p,
    .contact-note a {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.55);
    }

    .contact-note a {
      text-decoration: underline;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .contact-note a:hover {
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 48px;
      }
    }

    /* ── INDEX MODAL OVERLAY FULLSCREEN ── */
    .index-modal {
      position: fixed;
      bottom: -100vh;
      left: 0;
      right: 0;
      width: 100%;
      height: 100vh;
      z-index: 200;
      background: var(--bg);
      overflow: hidden;
      transition: bottom 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .index-modal.open {
      bottom: 0;
    }

    .index-close {
      position: absolute;
      top: 32px;
      right: 32px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.3s ease;
      z-index: 201;
    }

    .index-close:hover {
      opacity: 1;
      color: var(--accent);
    }

    .index-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 120px 32px;
      overflow-y: auto;
    }

    .index-header {
      text-align: center;
      margin-bottom: 80px;
    }

    .index-title {
      font-size: clamp(72px, 18vw, 140px);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .index-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .index-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 60px;
      max-width: 1200px;
      margin: 0 auto 80px;
    }

    .index-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .index-section-title {
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .index-link {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
      line-height: 2;
      opacity: 0.75;
      transition: opacity 0.3s ease;
    }

    .index-link:hover {
      opacity: 1;
      color: var(--accent);
    }

    .index-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer-text {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .open-app-btn {
      padding: 10px 26px;
      border: 2px solid var(--accent);
      border-radius: 18px;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Garet', sans-serif;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .open-app-btn:hover {
      background: transparent;
      color: var(--accent);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .section {
      animation: fadeIn 0.6s ease-out;
    }
  </style>
</head>
<body>

  <!-- NAVEGADOR PILL FIJO -->
  <div class="topbar">
    <button class="nav-pill active" onclick="scrollToSection('hero')">Manifesto</button>
    <button class="nav-pill" onclick="scrollToSection('contact')">Contacto</button>
    <button class="nav-pill" onclick="scrollToSection('blog')">Blog</button>
    <button class="nav-pill" onclick="scrollToSection('faq')">FQA</button>
    <button class="nav-pill" onclick="openIndex()">OpenApp</button>
  </div>

  <!-- HERO HEADER CON FONDO -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-nav">
        <div class="hero-brand">astrak</div>
        <div class="hero-nav-items">
          <button class="hero-nav-link" onclick="scrollToSection('manifesto')">Manifesto</button>
          <button class="hero-nav-link" onclick="scrollToSection('contact')">Contacto</button>
          <button class="hero-nav-link" onclick="scrollToSection('blog')">Blog</button>
          <button class="hero-nav-link" onclick="scrollToSection('faq')">FQA</button>
          <button class="hero-nav-link cta" onclick="openIndex()">OpenApp</button>
        </div>
      </div>

      <h1 class="hero-title">
        <span class="accent">Un sistema visual</span> para leer señales sin parecer un portal
      </h1>

      <div class="hero-image-container">
        <div class="hero-image-placeholder">
          [Imagen Placeholder]
        </div>
      </div>
    </div>
  </section>

  <!-- MANIFESTO -->
  <section class="section" id="manifesto">
    <div class="section-container">
      <div class="manifesto-grid">
        <div class="manifesto-left">
          <h2 class="section-title accent">
            Un sistema visual para leer señales sin parecer un portal
          </h2>
          <p class="section-text">
            La jerarquía no se apoya en cajas. Se apoya en contraste, escala, aire y secuencia. Cada bloque abre el siguiente con claridad para que la navegación se sienta editorial y no administrativa.
          </p>
          <p class="section-text">
            El objetivo es simple: que ASTRAK tenga una voz propia antes de que el usuario entre al app. Una home con peso, y un sistema operativo detrás.
          </p>
          <p class="section-text">
            ASTRAK no compite por volumen. Compite por criterio, ritmo y presencia. La landing explica la visión y el app la pone en movimiento con titulares, clima y tiempo real.
          </p>
        </div>

        <div class="manifesto-right">
          <div class="stat-block">
            <div class="stat-number">24HS</div>
            <div class="stat-label">Ciclo Visual</div>
            <div class="stat-description">La experiencia está pensada como una transmisión continua, no como una grilla fija.</div>
          </div>

          <div class="stat-block">
            <div class="stat-number">RSS</div>
            <div class="stat-label">Feeds Activos</div>
            <div class="stat-description">La app reúne señales externas y las vuelve legibles dentro de una jerarquía propia.</div>
          </div>

          <div class="stat-block">
            <div class="stat-number">06</div>
            <div class="stat-label">Categorías Núcleo</div>
            <div class="stat-description">Cada frente editorial tiene color, tono y prioridad visual consistentes en el sistema.</div>
          </div>

          <div class="stat-block">
            <div class="stat-number">AR</div>
            <div class="stat-label">Base Editorial</div>
            <div class="stat-description">La lectura del mundo parte desde Buenos Aires y ordena la señal con mirada local.</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CATEGORÍAS -->
  <section class="section" id="categories">
    <div class="section-container">
      <h2 class="section-title">No nos especializamos en noticias de todo tipo...</h2>
      <p class="section-text">
        Cada categoría usa un código cromático específico, con el color orientando la lectura y organizando la transmisión.
      </p>

      <div class="categories-content" style="margin-top: 48px;">
        <div class="categories-grid">
          <div class="category-badge">Política</div>
          <div class="category-badge">Tecnología</div>
          <div class="category-badge">Cine / Música</div>
          <div class="category-badge">Economía</div>
          <div class="category-badge">Internacional</div>
          <div class="category-badge">Cultura</div>
        </div>
      </div>
    </div>
  </section>

  <!-- BLOG -->
  <section class="section" id="blog">
    <div class="section-container">
      <h2 class="section-title">Notas y archivos</h2>
      <p class="section-text" style="margin-bottom: 48px;">
        Publicaciones propias, análisis cultural y registros del sistema visual. El archivo funciona como memoria editorial.
      </p>

      <div id="blogList" class="blog-list">
        <div class="blog-loading">Cargando archivo editorial…</div>
      </div>
    </div>
  </section>

  <!-- FAQ -->
  <section class="section" id="faq">
    <div class="section-container">
      <h2 class="section-title">Preguntas directas</h2>
      <p class="section-text" style="margin-bottom: 48px;">
        Respuestas cortas para entender cómo se organiza la landing y dónde empieza el sistema dinámico.
      </p>

      <div class="faq-grid">
        <article class="faq-item">
          <div class="faq-number">01</div>
          <h3 class="faq-question">Qué es ASTRAK?</h3>
          <p class="faq-answer">Una interfaz editorial que convierte noticias y cultura en una experiencia visual reactiva, atmosférica y menos convencional que los portales tradicionales.</p>
        </article>

        <article class="faq-item">
          <div class="faq-number">02</div>
          <h3 class="faq-question">Por qué el diseño se siente distinto?</h3>
          <p class="faq-answer">Porque el sistema prioriza tensión visual, jerarquía tipográfica, gradiente atmosférico y una lectura menos genérica de la información.</p>
        </article>

        <article class="faq-item">
          <div class="faq-number">03</div>
          <h3 class="faq-question">De dónde salen las noticias?</h3>
          <p class="faq-answer">De feeds RSS públicos organizados por categoría. Política, tecnología, cultura, cine, música, economía e internacional entran al sistema.</p>
        </article>

        <article class="faq-item">
          <div class="faq-number">04</div>
          <h3 class="faq-question">Dónde está la app principal?</h3>
          <p class="faq-answer">En `index.html`. Esta landing presenta la lógica del sistema; el app es donde sucede la experiencia completa con feeds en vivo.</p>
        </article>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section" id="contact">
    <div class="section-container">
      <h2 class="section-title">Enviar una señal</h2>
      <p class="section-text" style="margin-bottom: 64px;">
        Para colaboraciones, ideas editoriales o desarrollo del sistema visual. Contactanos y contanos tus ideas o problemas con Astrak.

      <div class="contact-grid">

  <!-- INDEX MODAL FULLSCREEN -->
  <div class="index-modal" id="indexModal">
    <button class="index-close" onclick="closeIndex()">close X</button>
    
    <div class="index-content">
      <div class="index-header">
        <div class="index-title">INDEX</div>
        <div class="index-subtitle">Acceso rápido a la estructura de la landing</div>
      </div>

      <div class="index-grid">
        <div class="index-section">
          <div class="index-section-title">Navegación</div>
          <a class="index-link" href="#hero" onclick="scrollAndCloseIndex('hero')">Hero</a>
          <a class="index-link" href="#manifesto" onclick="scrollAndCloseIndex('manifesto')">Manifesto</a>
          <a class="index-link" href="#categories" onclick="scrollAndCloseIndex('categories')">Categorías</a>
          <a class="index-link" href="#blog" onclick="scrollAndCloseIndex('blog')">Blog</a>
          <a class="index-link" href="#faq" onclick="scrollAndCloseIndex('faq')">Preguntas</a>
          <a class="index-link" href="#contact" onclick="scrollAndCloseIndex('contact')">Contacto</a>
        </div>

        <div class="index-section">
          <div class="index-section-title">Otros Proyectos</div>
          <a class="index-link" href="https://doppelganger-eta.vercel.app" target="_blank">dopple®</a>
          <a class="index-link" href="#">infinitydisk</a>
          <a class="index-link" href="#">sphinx</a>
          <a class="index-link" href="#">secondera</a>
        </div>

        <div class="index-section">
          <div class="index-section-title">Redes Sociales</div>
          <a class="index-link" href="https://instagram.com" target="_blank">Instagram</a>
          <a class="index-link" href="https://tiktok.com" target="_blank">TikTok</a>
          <a class="index-link" href="https://linkedin.com" target="_blank">LinkedIn</a>
        </div>
      </div>

      <div class="index-footer">
        <div class="footer-text">Buenos Aires — Argentina — Live since 2026</div>
        <button class="open-app-btn" onclick="window.open('index.html', '_blank')">Open App →</button>
      </div>
    </div>
  </div>

  <script>
    const uplinkForm = document.getElementById('uplink-form');
    const statusMsg = document.getElementById('status-msg');
    const indexModal = document.getElementById('indexModal');

    function scrollToSection(id) {
      const element = document.getElementById(id);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function openIndex() {
      indexModal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeIndex() {
      indexModal.classList.remove('open');
      document.body.style.overflow = 'auto';
    }

    function scrollAndCloseIndex(id) {
      closeIndex();
      setTimeout(() => {
        scrollToSection(id);
      }, 100);
    }

    uplinkForm.addEventListener('submit', (event) => {
      event.preventDefault();
      statusMsg.textContent = 'ENVIANDO SEÑAL…';

      window.setTimeout(() => {
        statusMsg.textContent = 'TRANSMISIÓN COMPLETADA ✓';
        uplinkForm.reset();
        
        setTimeout(() => {
          statusMsg.textContent = 'Powered by dopple® — Buenos Aires, 2026';
        }, 3000);
      }, 1200);
    });

    /* ── BLOG: fetch from dopple API ── */
    const DOPPLE_API = 'https://doppelganger-eta.vercel.app/api/entries';
    const DOPPLE_ARTICLE = 'https://doppelganger-eta.vercel.app/article.html';

    const TYPE_LABEL = { articulo: 'article', resena: 'review', archivo: 'archive' };

    async function loadBlog() {
      const list = document.getElementById('blogList');
      try {
        const res = await fetch(DOPPLE_API);
        if (!res.ok) throw new Error('api error');
        const all = await res.json();

        // Filter: published + tagged for astrak
        const entries = all.filter(e =>
          e.status === 'published' &&
          Array.isArray(e.sites) &&
          e.sites.includes('astrak')
        );

        if (!entries.length) {
          list.innerHTML = '<div class="blog-empty">No hay publicaciones aún en el archivo.</div>';
          return;
        }

        list.innerHTML = entries.map((e, i) => `
          <a class="blog-item" href="${DOPPLE_ARTICLE}?id=${e.id}" target="_blank">
            <div class="blog-number">${String(i + 1).padStart(2, '0')}</div>
            <div class="blog-content">
              <div class="blog-type">${TYPE_LABEL[e.postType] || e.postType || 'article'}</div>
              <div class="blog-title">${e.title}</div>
              ${e.excerpt ? `<div class="blog-excerpt">${e.excerpt}</div>` : ''}
            </div>
            <div class="blog-meta">${e.year || ''} ${e.author ? '— ' + e.author : ''}</div>
          </a>`).join('');

      } catch(err) {
        console.error('Blog load error:', err);
        list.innerHTML = '<div class="blog-empty">No se pudo cargar el archivo editorial.</div>';
      }
    }

    loadBlog();

    // Update active nav pill on scroll
    window.addEventListener('scroll', () => {
      const sections = ['hero', 'manifesto', 'categories', 'blog', 'faq', 'contact'];
      const scrollPos = window.scrollY + 200;

      sections.forEach(id => {
        const section = document.getElementById(id);
        if (section) {
          const sectionTop = section.offsetTop;
          const sectionBottom = sectionTop + section.offsetHeight;
          
          if (scrollPos >= sectionTop && scrollPos < sectionBottom) {
            document.querySelectorAll('.nav-pill').forEach(pill => pill.classList.remove('active'));
            document.querySelector(`.nav-pill[onclick*="${id}"]`)?.classList.add('active');
          }
        }
      });
    });
  </script>

</body>
