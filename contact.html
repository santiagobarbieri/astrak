<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20fill%3D%27black%27/%3E%3Ccircle%20cx%3D%2732%27%20cy%3D%2732%27%20r%3D%2714%27%20fill%3D%27white%27%20opacity%3D%270.9%27/%3E%3C/svg%3E" />
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    :root {
      --astrak-black: #000000;
      --astrak-white: #ffffff;
      --bg-current: #000;
    }

    * { box-sizing: border-box;}

    body {
      margin: 0;
      background-color: var(--astrak-black);
      color: var(--astrak-white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: screen;
      transition: background-color 2s ease;
    }

    /* --- CAPA ATMOSFÉRICA --- */
    #weather-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .lightning-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }

    @keyframes flash {
      0%, 98%, 100% { opacity: 0; }
      99% { opacity: 0.2; background: white; }
    }

    .storm-active .lightning-layer {
      animation: flash 10s infinite;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 3;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* --- UI DE TERMINAL --- */
    .content-layer { position: relative; z-index: 10; width: 100%; max-width: 500px; padding: 2rem; }

    .input-group { margin-bottom: 2.5rem; position: relative; }

    .label-terminal {
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      display: block;
      margin-bottom: 0.5rem;
    }

    .input-terminal {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.75rem 0;
      color: white;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      transition: all 0.3s;
      text-transform: uppercase;
    }

    .input-terminal:focus {
      border-bottom-color: rgba(255,255,255,0.8);
    }

    .btn-small {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px 24px;
      width: 100%;
      background: transparent;
      color: white;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .btn-small:hover {
      background: white;
      color: black;
      border-color: white;
    }

    .nav-mini {
      position: fixed;
      top: 40px;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .nav-mini:hover { opacity: 1; color: var(--astrak-white); }

    #status-msg {
      margin-top: 2rem;
      text-align: center;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="weather-canvas"></canvas>
  <div class="lightning-layer"></div>
  <div class="noise"></div>
  <div class="bg-glow"></div>

  <!-- Navegación -->
  <a href="index.html" class="nav-mini left-10">Home</a>
  <a href="about.html" class="nav-mini right-10">About</a>

  <div class="content-layer">
    <header class="text-center mb-16">
      <div class="w-4 h-4 bg-white rounded-full mx-auto mb-6 opacity-80"></div>
      <h1 class="text-[10px] font-black uppercase opacity-40">SEND A SIGNAL</h1>
    </header>

    <form id="uplink-form">
      <div class="input-group">
        <label class="label-terminal">Name</label>
        <input type="text" class="input-terminal" placeholder="USER_UNKNOWN" required>
      </div>

      <div class="input-group">
        <label class="label-terminal">Mail</label>
        <input type="email" class="input-terminal" placeholder="EMAIL@NETWORK.SYS" required>
      </div>

      <div class="input-group">
        <label class="label-terminal">Message</label>
        <textarea class="input-terminal" rows="1" placeholder="ESCRIBE TU MENSAJE..." required style="resize: none;"></textarea>
      </div>

      <button type="submit" class="btn-small">SEND SIGNAL</button>
    </form>

    <div id="status-msg">Powered by dopple®, Buenos Aires - Argentina, 2026</div>
  </div>

  <script>
    const canvas = document.getElementById('weather-canvas');
    const ctx = canvas.getContext('2d');
    let drops = [];
    let isNight = false;

    // Sincronizar ciclo día/noche y clima
    function updateEnvironment() {
      const hour = new Date().getHours();
      isNight = hour >= 19 || hour < 6;
      document.body.style.backgroundColor = isNight ? '#000' : '#0d1117';
      
      // Simulación de clima
      if(Math.random() > 0.6) {
        document.body.classList.add('storm-active');
      }
    }

    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drops = Array.from({length: 40}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        speed: Math.random() * 12 + 8,
        len: Math.random() * 25 + 15
      }));
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = isNight ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      
      drops.forEach(d => {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + 1, d.y + d.len);
        ctx.stroke();
        
        d.y += d.speed;
        if (d.y > canvas.height) {
          d.y = -20;
          d.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(animate);
    }

    // Manejo del Formulario
    document.getElementById('uplink-form').onsubmit = (e) => {
      e.preventDefault();
      const status = document.getElementById('status-msg');
      status.innerText = "ENVIANDO PAQUETES DE DATOS...";
      status.style.color = "rgba(255,255,255,0.8)";
      
      setTimeout(() => {
        status.innerText = "TRANSMISIÓN COMPLETADA. CONEXIÓN CERRADA.";
        document.getElementById('uplink-form').style.opacity = "0.1";
        document.getElementById('uplink-form').style.pointerEvents = "none";
      }, 2000);
    };

    window.onload = () => {
      updateEnvironment();
      initCanvas();
      animate();
    };

    window.onresize = initCanvas;
  </script>
</body>
</html>
