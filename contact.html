<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:'Inter', sans-serif;
}

.container {
  max-width:600px;
  margin:auto;
  padding:120px 20px;
}

h1 {
  font-size:36px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:40px;
}

input, textarea {
  width:100%;
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  padding:12px;
  color:white;
  margin-bottom:20px;
  font-family:inherit;
}

textarea {
  min-height:120px;
}

button {
  width:100%;
  padding:12px;
  background:white;
  color:black;
  border:none;
  font-weight:900;
  text-transform:uppercase;
  cursor:pointer;
}

button:hover {
  background:#e2ff00;
}

.status {
  margin-top:20px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
  <h1>Contacto</h1>

  <form id="form">
    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Mensaje"></textarea>
    <button type="submit">Enviar</button>
  </form>

  <div class="status" id="status"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("status").innerText = "Mensaje enviado (simulado)";
});
</script>

</body>
</html>
