<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Astrak</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        :root {
            --astrak-black: #000;
            --astrak-white: #fff;
        }

        body {
            background-color: var(--astrak-black);
            color: var(--astrak-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .font-black { font-weight: 900; }
        .tracking-tightest { letter-spacing: -0.06em; }
        .leading-tightest { line-height: 0.85; }

        ::-webkit-scrollbar { display: none; }
        
        /* Animaciones Meteorológicas */
        @keyframes rain-fall {
            0% { transform: translateY(-120vh) rotate(15deg); }
            100% { transform: translateY(120vh) rotate(15deg); }
        }
        .rain-drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255,255,255,0.2));
            width: 1px;
            height: 80px;
            animation: rain-fall 0.7s linear infinite;
        }

        @keyframes cloud-drift {
            from { transform: translateX(-20%) scale(1); }
            to { transform: translateX(120%) scale(1.1); }
        }
        .cloud-element {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: cloud-drift 80s linear infinite;
        }

        @keyframes lightning-bolt {
            0%, 94%, 100% { opacity: 0; }
            96% { opacity: 1; background: #fff; }
            97% { opacity: 0.2; }
            98% { opacity: 0.8; background: #e0f2fe; }
        }
        .lightning-effect {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            animation: lightning-bolt 6s ease-in-out infinite;
        }

        .analog-noise {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 20;
        }

        .gradient-vignette {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,1) 100%);
        }

        .loader-ring {
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: #fff;
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .astrak-field {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 0;
            width: 100%;
            outline: none;
            font-size: 0.8rem;
            color: #fff;
            transition: border-color 0.4s ease;
        }
        .astrak-field:focus { border-bottom-color: #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const MotionLib = window.FramerMotion || window.Motion;
        const { motion, AnimatePresence } = MotionLib;

        const CATEGORIES = [
            { id: 'ALL', color: '#e2ff00', query: 'https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'POLITICS', color: '#3b82f6', query: 'https://news.google.com/rss/headlines/section/topic/POLITICS?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'TECH', color: '#a855f7', query: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'ECONOMY', color: '#10b981', query: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'WORLD', color: '#f59e0b', query: 'https://news.google.com/rss/headlines/section/topic/WORLD?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'CULTURE', color: '#ec4899', query: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=es-419&gl=AR&ceid=AR:es-419' }
        ];

        // Función para formatear el tiempo transcurrido
        const getTimeAgo = (pubDate) => {
            const now = new Date();
            const published = new Date(pubDate);
            const diffInMs = now - published;
            const diffInMins = Math.floor(diffInMs / (1000 * 60));
            const diffInHours = Math.floor(diffInMins / 60);

            if (diffInMins < 1) return "hace unos segundos";
            if (diffInMins < 60) return `hace ${diffInMins} min`;
            if (diffInHours < 24) return `hace ${diffInHours} horas`;
            return `hace ${Math.floor(diffInHours / 24)} días`;
        };

        // --- COMPONENTE ATMOSFERA ---
        const Atmosphere = ({ time }) => {
            const [state, setState] = useState({ condition: 'clear', intensity: 30 });

            useEffect(() => {
                const hour = time.getHours();
                const rand = Math.random();
                let cond = 'clear';
                if (rand > 0.85) cond = 'storm';
                else if (rand > 0.7) cond = 'rain';
                else if (rand > 0.5) cond = 'cloudy';
                
                setState({ 
                    condition: cond, 
                    isNight: hour >= 19 || hour < 6,
                    intensity: Math.floor(Math.random() * 40) + 20 
                });
            }, [time.getHours()]);

            const celestialPos = useMemo(() => {
                const hours = time.getHours() + time.getMinutes() / 60;
                let isDay = hours >= 6 && hours < 19;
                let progress;
                
                if (isDay) {
                    progress = (hours - 6) / 13; 
                } else {
                    const nightHours = hours >= 19 ? hours - 19 : hours + 5;
                    progress = nightHours / 11;
                }
                
                return {
                    x: progress * 100,
                    y: 80 - (Math.sin(progress * Math.PI) * 60),
                    isDay
                };
            }, [time]);

            const cloudsArray = Array.from({ length: (state.condition !== 'clear' ? 8 : 0) });
            const rainArray = Array.from({ length: (state.condition === 'rain' || state.condition === 'storm' ? state.intensity : 0) });

            return (
                <div className="absolute inset-0 z-0 transition-all duration-[4000ms] ease-in-out"
                     style={{ 
                         background: celestialPos.isDay 
                            ? (state.condition === 'clear' ? '#0a1e3b' : '#1a2a3a') 
                            : '#000' 
                     }}>
                    
                    {!celestialPos.isDay && (
                        <div className="absolute inset-0 opacity-30">
                            {Array.from({ length: 50 }).map((_, i) => (
                                <div key={i} className="absolute bg-white rounded-full" 
                                     style={{ 
                                         width: Math.random() * 1.5 + 'px', 
                                         height: Math.random() * 1.5 + 'px',
                                         top: Math.random() * 100 + '%',
                                         left: Math.random() * 100 + '%'
                                     }} />
                            ))}
                        </div>
                    )}

                    <motion.div 
                        animate={{ left: `${celestialPos.x}%`, top: `${celestialPos.y}%` }}
                        className={`absolute rounded-full blur-[60px] z-10 ${celestialPos.isDay ? 'bg-yellow-100/40 shadow-[0_0_120px_rgba(254,240,138,0.3)]' : 'bg-slate-200/20 shadow-[0_0_80px_rgba(241,245,249,0.2)]'}`}
                        style={{ width: '120px', height: '120px', transform: 'translate(-50%, -50%)' }}
                    />

                    {cloudsArray.map((_, i) => (
                        <div key={`cloud-${i}`} className="cloud-element" 
                             style={{ 
                                 width: (300 + Math.random() * 500) + 'px', 
                                 height: (150 + Math.random() * 250) + 'px',
                                 top: (5 + Math.random() * 45) + '%',
                                 animationDelay: (i * -12) + 's',
                                 opacity: state.condition === 'storm' ? 0.4 : 0.15
                             }} />
                    ))}

                    {rainArray.map((_, i) => (
                        <div key={`rain-${i}`} className="rain-drop" 
                             style={{ 
                                 left: Math.random() * 110 + '%', 
                                 animationDelay: Math.random() * 1.5 + 's',
                                 opacity: 0.3
                             }} />
                    ))}

                    {state.condition === 'storm' && <div className="lightning-effect" />}

                    <div className="absolute inset-0 gradient-vignette z-20" />
                    <div className="analog-noise" />
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            const [news, setNews] = useState([]);
            const [headline, setHeadline] = useState(null);
            const [filter, setFilter] = useState(CATEGORIES[0]);
            const [time, setTime] = useState(new Date());
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const processRssItem = useCallback((item, catId, color) => {
                // Extraer fuente real: Google News pone "Título - Fuente"
                const titleParts = (item.title || "").split(' - ');
                const cleanTitle = titleParts[0].trim();
                const realSource = titleParts.length > 1 ? titleParts[titleParts.length - 1] : "Fuente Global";

                return {
                    id: item.guid || Math.random().toString(36).substr(2, 9),
                    title: cleanTitle,
                    excerpt: (item.description || "").replace(/<[^>]*>?/gm, '').substring(0, 160).trim(),
                    source: realSource,
                    url: item.link,
                    category: catId,
                    color: color,
                    timeAgo: getTimeAgo(item.pubDate)
                };
            }, []);

            const fetchNews = useCallback(async (cat) => {
                setIsLoading(true);
                try {
                    let items = [];
                    if (cat.id === 'ALL') {
                        const targetCats = CATEGORIES.slice(1, 5);
                        const results = await Promise.all(
                            targetCats.map(t => 
                                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(t.query)}`)
                                .then(r => r.json())
                                .then(res => (res.items || []).slice(0, 5).map(i => processRssItem(i, t.id, t.color)))
                                .catch(() => [])
                            )
                        );
                        items = results.flat().sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                    } else {
                        const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(cat.query)}`);
                        const data = await response.json();
                        if (data.status === 'ok') {
                            items = data.items.map(i => processRssItem(i, cat.id, cat.color));
                        }
                    }

                    if (items.length > 0) {
                        setHeadline(items[0]);
                        setNews(items.slice(1, 12));
                    }
                } catch (error) {
                    console.error("Signal Lost:", error);
                } finally {
                    setIsLoading(false);
                }
            }, [processRssItem]);

            useEffect(() => {
                fetchNews(filter);
            }, [filter, fetchNews]);

            return (
                <div className="min-h-screen bg-black text-white selection:bg-white selection:text-black">
                    <header className="fixed top-0 left-0 right-0 z-[100] bg-white text-black px-6 py-2 flex justify-between items-center border-b border-black/5 backdrop-blur-xl bg-white/90">
                        <div className="flex items-center gap-6">
                            <h1 className="text-lg font-black tracking-tighter uppercase italic">Astrak</h1>
                            <nav className="hidden md:flex items-center gap-0.5">
                                {CATEGORIES.map((cat) => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setFilter(cat)}
                                        className={`relative px-3 py-1 text-[8px] font-black uppercase tracking-[0.2em] z-10 transition-all ${filter.id === cat.id ? 'text-black' : 'text-neutral-400 hover:text-black'}`}
                                    >
                                        {cat.id}
                                        {filter.id === cat.id && (
                                            <motion.div layoutId="activePill" className="absolute inset-0 rounded-full z-[-1]" style={{ backgroundColor: cat.color }} />
                                        )}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="text-[9px] font-black uppercase tracking-widest opacity-60 flex items-center gap-4">
                            <span>{time.getHours() >= 12 ? 'AFTERNOON' : 'MORNING'}</span>
                            <span className="w-px h-3 bg-black/10"></span>
                            <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>
                        </div>
                    </header>

                    <main>
                        <AnimatePresence mode="wait">
                            {isLoading ? (
                                <div className="h-screen flex items-center justify-center"><div className="loader-ring"></div></div>
                            ) : (
                                headline && (
                                    <motion.section 
                                        key={headline.id}
                                        initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                        className="relative min-h-[90vh] flex flex-col justify-end px-8 md:px-16 pb-24 pt-40 overflow-hidden"
                                    >
                                        <Atmosphere time={time} />
                                        
                                        <div className="relative z-30 grid grid-cols-1 lg:grid-cols-12 gap-12 items-end">
                                            <div className="lg:col-span-8 max-w-4xl">
                                                <span className="text-[10px] opacity-40 font-bold mb-4 block tracking-[0.3em] uppercase italic">Priority Transmission _</span>
                                                <h2 className="text-4xl md:text-5xl lg:text-6xl font-black leading-tightest tracking-tightest mb-6 uppercase text-white drop-shadow-lg">
                                                    {headline.title}
                                                </h2>
                                                <p className="text-sm md:text-base text-neutral-300 leading-relaxed font-medium italic opacity-80 max-w-xl">
                                                    {headline.excerpt}...
                                                </p>
                                            </div>
                                            <div className="lg:col-span-4 flex flex-col items-start lg:items-end text-left lg:text-right space-y-6">
                                                <div className="px-4 py-1 text-[9px] font-black uppercase tracking-[0.3em]" style={{backgroundColor: headline.color, color: '#000'}}>
                                                    {headline.category}
                                                </div>
                                                <div className="space-y-1">
                                                    <div className="text-[10px] font-bold opacity-50 uppercase italic tracking-widest">
                                                        via {headline.source} • {headline.timeAgo}
                                                    </div>
                                                    <div className="text-[8px] font-medium opacity-30 uppercase">Status: Verified Signal</div>
                                                </div>
                                                <a href={headline.url} target="_blank" className="text-[10px] font-black uppercase border-b-2 border-white/20 pb-1 tracking-tighter hover:border-white transition-all">
                                                    Open Preview ↗
                                                </a>
                                            </div>
                                        </div>
                                    </motion.section>
                                )
                            )}
                        </AnimatePresence>

                        <section className="px-8 md:px-16 py-32 bg-black">
                            <div className="max-w-6xl mx-auto">
                                <div className="flex items-center gap-4 mb-20">
                                    <span className="text-[9px] font-black uppercase tracking-[0.5em] text-neutral-700 italic underline decoration-neutral-800">Sequential_Signals</span>
                                    <div className="h-px flex-grow bg-white/[0.05]"></div>
                                </div>

                                <div className="space-y-24">
                                    {!isLoading && news.map((item, idx) => (
                                        <motion.div 
                                            key={item.id}
                                            initial={{ opacity: 0, y: 20 }}
                                            whileInView={{ opacity: 1, y: 0 }}
                                            viewport={{ once: true, margin: "-100px" }}
                                            className="group cursor-pointer border-b border-white/[0.02] pb-16"
                                            onClick={() => window.open(item.url, '_blank')}
                                        >
                                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-12 items-start">
                                                <div className="lg:col-span-3 space-y-5">
                                                    <div className="flex items-center gap-4 text-[9px] font-black uppercase tracking-widest">
                                                        <span className="font-black" style={{color: item.color}}>{item.category}</span>
                                                        <span className="opacity-40 italic">via {item.source} • {item.timeAgo}</span>
                                                    </div>
                                                    <h3 className="text-2xl md:text-3xl font-black tracking-tightest leading-none uppercase group-hover:opacity-50 transition-all duration-500">
                                                        {item.title}
                                                    </h3>
                                                    <p className="text-neutral-500 text-xs md:text-sm leading-relaxed max-w-3xl opacity-60 italic">
                                                        {item.excerpt}
                                                    </p>
                                                </div>
                                                <div className="hidden lg:flex flex-col items-end pt-2">
                                                    <span className="text-[9px] font-bold opacity-10 group-hover:opacity-40 transition-opacity uppercase italic">Node_{idx.toString().padStart(2, '0')}</span>
                                                </div>
                                            </div>
                                        </motion.div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="bg-black text-white px-8 md:px-16 py-32 border-t border-white/[0.05]">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-start lg:items-end gap-20">
                            <div className="space-y-12">
                                <h1 className="text-[120px] md:text-[200px] font-black tracking-tightest leading-[0.7] opacity-10 italic">Astrak</h1>
                                <div className="max-w-md space-y-6">
                                    <h4 className="text-[10px] font-black uppercase tracking-[0.3em] opacity-30 italic">Protocol Documentation_</h4>
                                    <p className="text-[12px] text-neutral-600 leading-relaxed italic">
                                        Astrak es un sintetizador de noticias de alta frecuencia. Los datos son extraídos en tiempo real y la atmósfera del sistema se sincroniza con el horario local.
                                    </p>
                                </div>
                            </div>
                            <div className="w-full lg:w-96 space-y-12">
                                <h4 className="text-4xl font-black italic tracking-tighter uppercase">Signal_Feedback</h4>
                                <div className="space-y-8">
                                    <input type="text" placeholder="Operator_ID" className="astrak-field" />
                                    <input type="email" placeholder="node@astrak.io" className="astrak-field" />
                                    <button className="w-full py-5 bg-white text-black font-black uppercase text-[10px] tracking-[0.4em] hover:bg-neutral-300 transition-all active:scale-95">
                                        Transmit_Feedback
                                    </button>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
