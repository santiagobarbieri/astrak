<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRAK | High-Frequency Signal</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/tailwind.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        :root { --astrak-black: #000; --astrak-white: #fff; }
        body { background-color: var(--astrak-black); color: var(--astrak-white); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .font-black { font-weight: 900; }
        .tracking-tightest { letter-spacing: -0.06em; }
        .leading-tightest { line-height: 0.85; }
        ::-webkit-scrollbar { display: none; }
        
        /* Animaciones */
        @keyframes rain-fall { 0% { transform: translateY(-100vh) rotate(15deg); } 100% { transform: translateY(100vh) rotate(15deg); } }
        .rain-drop { position: absolute; background: linear-gradient(transparent, rgba(255,255,255,0.2)); width: 1px; height: 80px; animation: rain-fall 0.8s linear infinite; }
        .analog-noise { position: absolute; inset: 0; opacity: 0.04; pointer-events: none; z-index: 20; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .gradient-vignette { background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,1) 100%); position: absolute; inset: 0; z-index: 10; }
        .loader-ring { border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; width: 2rem; height: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .astrak-field { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; width: 100%; outline: none; font-size: 0.8rem; color: #fff; transition: border-color 0.4s; }
        .astrak-field:focus { border-bottom-color: #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { motion, AnimatePresence } = window.FramerMotion;

        const CATEGORIES = [
            { id: 'ALL', color: '#e2ff00', query: 'https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'POLITICS', color: '#3b82f6', query: 'https://news.google.com/rss/headlines/section/topic/POLITICS?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'TECH', color: '#a855f7', query: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'ECONOMY', color: '#10b981', query: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'WORLD', color: '#f59e0b', query: 'https://news.google.com/rss/headlines/section/topic/WORLD?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'CULTURE', color: '#ec4899', query: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=es-419&gl=AR&ceid=AR:es-419' }
        ];

        const getTimeAgo = (dateStr) => {
            const diff = new Date() - new Date(dateStr);
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return `${mins} min ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours} hr ago`;
            return `${Math.floor(hours / 24)} days ago`;
        };

        const Atmosphere = ({ time }) => {
            const hour = time.getHours();
            const isNight = hour >= 19 || hour < 6;
            
            const pos = useMemo(() => {
                const h = time.getHours() + time.getMinutes() / 60;
                const progress = (h >= 6 && h < 19) ? (h - 6) / 13 : (h >= 19 ? h - 19 : h + 5) / 11;
                return { x: progress * 100, y: 80 - (Math.sin(progress * Math.PI) * 60) };
            }, [time]);

            return (
                <div className="absolute inset-0 z-0 transition-colors duration-[4000ms]" style={{ background: isNight ? '#000' : '#0a1e3b' }}>
                    <div className="absolute inset-0 opacity-20">
                        {isNight && Array.from({length: 30}).map((_, i) => (
                            <div key={i} className="absolute bg-white rounded-full" style={{ width: '1px', height: '1px', top: Math.random()*100+'%', left: Math.random()*100+'%' }} />
                        ))}
                    </div>
                    <motion.div animate={{ left: `${pos.x}%`, top: `${pos.y}%` }} className={`absolute rounded-full blur-[80px] ${isNight ? 'bg-slate-200/10' : 'bg-yellow-100/30'}`} style={{ width: '150px', height: '150px', transform: 'translate(-50%, -50%)' }} />
                    <div className="gradient-vignette" />
                    <div className="analog-noise" />
                </div>
            );
        };

        const App = () => {
            const [news, setNews] = useState([]);
            const [headline, setHeadline] = useState(null);
            const [filter, setFilter] = useState(CATEGORIES[0]);
            const [time, setTime] = useState(new Date());
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            const process = useCallback((item, cat) => {
                const titleParts = (item.title || "").split(' - ');
                return {
                    id: item.guid || Math.random(),
                    title: titleParts[0],
                    source: titleParts.length > 1 ? titleParts[titleParts.length - 1] : "Global Feed",
                    excerpt: (item.description || "").replace(/<[^>]*>?/gm, '').substring(0, 160),
                    url: item.link,
                    category: cat.id,
                    color: cat.color,
                    timeAgo: getTimeAgo(item.pubDate)
                };
            }, []);

            const fetchNews = useCallback(async (cat) => {
                setLoading(true);
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(cat.query)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        const items = data.items.map(i => process(i, cat));
                        setHeadline(items[0]);
                        setNews(items.slice(1, 12));
                    }
                } catch (e) { console.error("Signal Lost"); }
                setLoading(false);
            }, [process]);

            useEffect(() => { fetchNews(filter); }, [filter, fetchNews]);

            return (
                <div className="min-h-screen bg-black text-white">
                    <header className="fixed top-0 inset-x-0 z-[100] bg-white/90 backdrop-blur-md text-black px-6 py-3 flex justify-between items-center border-b border-black/10">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black italic tracking-tighter uppercase">Astrak</h1>
                            <nav className="hidden md:flex gap-1">
                                {CATEGORIES.map(c => (
                                    <button key={c.id} onClick={() => setFilter(c)} className={`px-3 py-1 text-[9px] font-black uppercase tracking-widest transition-opacity ${filter.id === c.id ? 'opacity-100' : 'opacity-30'}`} style={{ color: filter.id === c.id ? c.color : 'inherit' }}>
                                        {c.id}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="text-[10px] font-black uppercase opacity-60 italic">{time.toLocaleTimeString()}</div>
                    </header>

                    <main>
                        <AnimatePresence mode="wait">
                            {loading ? (
                                <div className="h-screen flex items-center justify-center"><div className="loader-ring" /></div>
                            ) : (
                                headline && (
                                    <motion.section initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="relative h-[90vh] flex flex-col justify-end px-8 md:px-16 pb-24 overflow-hidden">
                                        <Atmosphere time={time} />
                                        <div className="relative z-30 max-w-5xl">
                                            <div className="mb-4 inline-block px-4 py-1 text-[10px] font-black text-black uppercase tracking-widest" style={{ backgroundColor: headline.color }}>
                                                {headline.category}
                                            </div>
                                            <h2 className="text-5xl md:text-7xl font-black leading-tightest tracking-tightest uppercase italic mb-8 drop-shadow-2xl">
                                                {headline.title}
                                            </h2>
                                            <div className="flex flex-wrap items-center gap-6 text-[10px] font-bold uppercase tracking-widest opacity-60 italic">
                                                <span>via {headline.source}</span>
                                                <span className="w-1 h-1 bg-white rounded-full" />
                                                <span>{headline.timeAgo}</span>
                                                <a href={headline.url} target="_blank" className="border-b border-white/40 hover:border-white transition-colors">Open Preview ↗</a>
                                            </div>
                                        </div>
                                    </motion.section>
                                )
                            )}
                        </AnimatePresence>

                        <section className="px-8 md:px-16 py-24 max-w-6xl mx-auto space-y-20">
                            {!loading && news.map((item, idx) => (
                                <motion.div key={item.id} initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} className="group cursor-pointer border-b border-white/5 pb-12" onClick={() => window.open(item.url, '_blank')}>
                                    <div className="flex items-center gap-4 text-[9px] font-black uppercase tracking-widest mb-4">
                                        <span style={{ color: item.color }}>{item.category}</span>
                                        <span className="opacity-20 italic">via {item.source} • {item.timeAgo}</span>
                                    </div>
                                    <h3 className="text-2xl md:text-3xl font-black uppercase italic leading-none tracking-tightest group-hover:opacity-50 transition-opacity">
                                        {item.title}
                                    </h3>
                                    <p className="mt-4 text-neutral-500 text-sm italic max-w-3xl leading-relaxed">{item.excerpt}...</p>
                                </motion.div>
                            ))}
                        </section>
                    </main>

                    <footer className="bg-black border-t border-white/10 px-8 py-24 text-center">
                        <h1 className="text-[15vw] font-black italic tracking-tightest opacity-5 leading-none mb-12">ASTRAK</h1>
                        <div className="max-w-md mx-auto space-y-8">
                            <input type="email" placeholder="NODE@ASTRAK.IO" className="astrak-field text-center uppercase font-black" />
                            <button className="w-full py-4 bg-white text-black font-black uppercase text-[10px] tracking-[0.4em] hover:invert transition-all">Transmit Feedback</button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
