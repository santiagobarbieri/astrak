<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20fill%3D%27black%27/%3E%3Ccircle%20cx%3D%2732%27%20cy%3D%2732%27%20r%3D%2714%27%20fill%3D%27white%27%20opacity%3D%270.9%27/%3E%3C/svg%3E" />
  <title>Astrak | Sintetizador de Noticias</title>

  <!-- Dependencias -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

    :root {
      --astrak-black: #000000;
      --astrak-white: #ffffff;
      --astrak-accent: #e2ff00;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: #000; }
    body {
      margin: 0;
      overflow-x: hidden;
      background-color: var(--astrak-black);
      color: var(--astrak-white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animaciones Atmosféricas */
    @keyframes rain-fall { 0% { transform: translateY(-120vh) rotate(15deg); } 100% { transform: translateY(120vh) rotate(15deg); } }
    @keyframes lightning-bolt { 
      0%, 94%, 100% { opacity: 0; } 
      95% { opacity: 1; background: #ffffff; } 
      96% { opacity: 0.3; } 
      97% { opacity: 0.9; background: #f0f9ff; } 
    }
    @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .rain-drop { position: absolute; width: 1.5px; height: 120px; background: linear-gradient(transparent, rgba(255, 255, 255, 0.25)); animation: rain-fall 0.7s linear infinite; pointer-events: none; }
    .lightning-effect { position: absolute; inset: 0; z-index: 5; pointer-events: none; animation: lightning-bolt 10s ease-in-out infinite; }
    .analog-noise { position: absolute; inset: 0; z-index: 20; pointer-events: none; opacity: 0.07; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.03), transparent); animation: scanline 10s linear infinite; z-index: 21; pointer-events: none; }
    
    .hero-depth-gradient { 
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.7) 60%, #000 100%); 
      position: absolute;
      inset: 0;
      z-index: 15;
    }

    .astrak-font-black { font-weight: 900; }
    .astrak-tracking-tightest { letter-spacing: -0.04em; }
    .astrak-leading-tightest { line-height: 1.05; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const MotionLib = window.FramerMotion || window.Motion;
    const { motion, AnimatePresence } = MotionLib;

    const RSS_TO_JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

    const CATEGORIES = [
      { id: 'ALL', name: 'Global', color: '#e2ff00', query: 'https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'POLITICS', name: 'Política', color: '#4dabff', query: 'https://news.google.com/rss/headlines/section/topic/POLITICS?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'TECH', name: 'Tecnología', color: '#c084fc', query: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'CINE', name: 'Cine', color: '#ff4d4d', query: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'MUSIC', name: 'Música', color: '#ffd700', query: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'ECONOMY', name: 'Economía', color: '#34d399', query: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'WORLD', name: 'Internacional', color: '#fbbf24', query: 'https://news.google.com/rss/headlines/section/topic/WORLD?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'CULTURE', name: 'Cultura', color: '#f472b6', query: 'https://news.google.com/rss/headlines/section/topic/HEALTH?hl=es-419&gl=AR&ceid=AR:es-419' },
    ];

    const AstrakLogo = ({ className }) => (
      <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="black"/>
        <circle cx="50" cy="50" r="22" stroke="white" strokeWidth="12"/>
        <circle cx="50" cy="50" r="6" fill="white"/>
      </svg>
    );

    const LoadingScreen = () => (
      <div className="fixed inset-0 z-[300] bg-black flex flex-col items-center justify-center">
        <AstrakLogo className="w-12 h-12 mb-8 animate-pulse" />
        <motion.span 
          animate={{ opacity: [0.3, 1, 0.3] }}
          transition={{ duration: 1.5, repeat: Infinity }}
          className="text-[10px] font-black uppercase tracking-[0.6em]"
        >
          Protocolo Inicial _
        </motion.span>
      </div>
    );

    const Atmosphere = ({ weather }) => {
      const drops = useMemo(() => Array.from({ length: weather.intensity }), [weather.intensity]);
      return (
        <div className="absolute inset-0 z-0 transition-colors duration-[3000ms]" style={{ background: weather.isNight ? '#000' : '#0d111a' }}>
          <div className="lightning-effect" style={{ display: weather.condition === 'storm' ? 'block' : 'none' }} />
          {drops.map((_, i) => (
            <div key={i} className="rain-drop" style={{ 
              left: `${Math.random() * 100}%`, 
              top: `-${Math.random() * 20}%`,
              animationDelay: `${Math.random() * 2}s`,
              opacity: Math.random() * 0.5
            }} />
          ))}
          <div className="hero-depth-gradient" />
          <div className="scanline" />
          <div className="analog-noise" />
        </div>
      );
    };

    const Header = ({ activeId, onSelect, time }) => {
      const [isOpen, setIsOpen] = useState(false);
      const activeCat = CATEGORIES.find(c => c.id === activeId);

      return (
        <>
          <header className="fixed top-0 left-0 right-0 z-[100] border-b border-white/10 bg-black/50 backdrop-blur-3xl px-6 py-2.5 flex items-center justify-between">
            <div className="flex items-center gap-8">
              <div 
                className="cursor-pointer flex items-center gap-3 group"
                onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}
              >
                <AstrakLogo className="w-7 h-7 transition-transform group-hover:scale-110" />
                <span className="hidden sm:block text-[9px] font-black uppercase tracking-[0.4em] text-white/50">Core.V4</span>
              </div>
              
              <nav className="hidden lg:flex gap-1 items-center bg-white/5 p-1 rounded-full border border-white/5 overflow-x-auto no-scrollbar max-w-[60vw]">
                {CATEGORIES.map(cat => (
                  <button 
                    key={cat.id} 
                    onClick={() => onSelect(cat)}
                    className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeId === cat.id ? 'bg-white text-black' : 'text-neutral-400 hover:text-white hover:bg-white/5'}`}
                  >
                    {cat.name}
                  </button>
                ))}
              </nav>

              <button 
                onClick={() => setIsOpen(true)}
                className="lg:hidden flex items-center gap-3 px-4 py-1.5 rounded-full border border-white/10 bg-white/5"
              >
                <div className="w-1.5 h-1.5 rounded-full animate-pulse" style={{backgroundColor: activeCat.color}} />
                <span className="text-[10px] font-black uppercase tracking-widest">{activeCat.name}</span>
              </button>
            </div>
            
            <div className="text-[10px] font-black text-white/70 uppercase tracking-widest tabular-nums bg-white/10 px-3 py-1 rounded">
              {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
            </div>
          </header>

          <AnimatePresence>
            {isOpen && (
              <motion.div 
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                className="fixed inset-0 z-[200] bg-black/98 backdrop-blur-3xl p-8 flex flex-col"
              >
                <div className="flex justify-between items-center mb-16">
                  <span className="text-[10px] font-black uppercase tracking-[0.5em] text-white/30">Protocol Selector</span>
                  <button onClick={() => setIsOpen(false)} className="w-10 h-10 flex items-center justify-center rounded-full border border-white/10 text-xl font-light">&times;</button>
                </div>
                <div className="flex-1 flex flex-col justify-center gap-3 overflow-y-auto no-scrollbar">
                  {CATEGORIES.map((cat, idx) => (
                    <button
                      key={cat.id}
                      onClick={() => { onSelect(cat); setIsOpen(false); }}
                      className={`text-left py-4 border-b border-white/5 flex items-center justify-between group transition-all ${activeId === cat.id ? 'opacity-100' : 'opacity-40'}`}
                    >
                      <h2 className="text-3xl font-black uppercase italic tracking-tighter" style={activeId === cat.id ? { color: cat.color } : {}}>
                        {cat.name}
                      </h2>
                      {activeId === cat.id && <motion.div layoutId="m-active" className="h-0.5 w-10" style={{ backgroundColor: cat.color }} />}
                    </button>
                  ))}
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    }

    function App() {
      const [news, setNews] = useState([]);
      const [headline, setHeadline] = useState(null);
      const [activeCat, setActiveCat] = useState(CATEGORIES[0]);
      const [time, setTime] = useState(new Date());
      const [loading, setLoading] = useState(true);
      const [weather, setWeather] = useState({ condition: 'storm', intensity: 45, isNight: false });

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        setWeather(prev => ({ ...prev, isNight: new Date().getHours() >= 19 || new Date().getHours() < 6 }));
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        setLoading(true);
        const load = async () => {
          try {
            let results = [];
            const buildItem = (item, cat) => {
              const parts = item.title.split(' - ');
              return {
                id: item.guid || item.link,
                title: parts[0]?.trim() || 'Sin título',
                source: parts[parts.length - 1]?.trim() || 'Desconocido',
                excerpt: item.description?.replace(/<[^>]*>?/gm, ' ').slice(0, 150) + '...',
                url: item.link,
                color: cat.color,
                category: cat.name,
                pubDate: item.pubDate,
                timeAgo: (() => {
                  const d = new Date() - new Date(item.pubDate);
                  const m = Math.floor(d / 60000);
                  if (m < 60) return `${m}m`;
                  const h = Math.floor(m / 60);
                  if (h < 24) return `${h}h`;
                  return `${Math.floor(h / 24)}d`;
                })()
              };
            };

            const query = activeCat.query;
            const res = await fetch(`${RSS_TO_JSON_API}${encodeURIComponent(query)}`);
            const data = await res.json();
            
            results = data.items.map(item => buildItem(item, activeCat));
            
            // Si es Cine o Música, intentamos filtrar o priorizar términos relacionados si el RSS es compartido
            if (activeCat.id === 'CINE') {
                // Simulación de filtrado más específico para reviews si fuera necesario
            }
            
            setHeadline(results[0]);
            setNews(results.slice(1, 16));
          } catch(e) {
            console.error(e);
          } finally {
            setLoading(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        };
        load();
      }, [activeCat]);

      return (
        <div className="min-h-screen bg-black text-white selection:bg-white selection:text-black">
          <Header activeId={activeCat.id} onSelect={setActiveCat} time={time} />
          
          <main>
            <AnimatePresence mode="wait">
              {loading ? (
                <LoadingScreen key="loader" />
              ) : (
                <motion.div key={activeCat.id} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                  
                  {headline && (
                    <section className="relative h-screen flex flex-col justify-end px-6 md:px-16 pb-20 overflow-hidden">
                      <Atmosphere weather={weather} />
                      
                      <div className="relative z-30 max-w-3xl">
                        <motion.div initial={{ y: 40, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 0.8, ease: "easeOut" }}>
                          <div className="flex items-center gap-4 mb-10">
                            <div className="px-2.5 py-0.5 border border-white/20 text-[8px] font-black uppercase tracking-[0.3em] bg-white/5">Señal {activeCat.id}</div>
                            <div className="w-2 h-2 rounded-full shadow-[0_0_8px_rgba(255,255,255,0.4)] animate-pulse" style={{backgroundColor: headline.color}} />
                            <span className="text-[10px] font-black uppercase tracking-[0.4em] text-white/60">{headline.category}</span>
                          </div>
                          
                          <h2 className="astrak-font-black text-1xl md:text-2xl lg:text-3xl uppercase astrak-tracking-tightest astrak-leading-tightest mb-10">
                            {headline.title}
                          </h2>
                          
                          <div className="flex items-center gap-8">
                            <div className="flex flex-col">
                              <span className="text-[8px] font-black uppercase tracking-widest text-white/30 mb-1">Origen</span>
                              <span className="text-[10px] font-bold uppercase tracking-wider text-white/80">{headline.source}</span>
                            </div>
                            <div className="flex flex-col">
                              <span className="text-[8px] font-black uppercase tracking-widest text-white/30 mb-1">Sincronización</span>
                              <span className="text-[10px] font-bold uppercase tracking-wider text-white/80">Hace {headline.timeAgo}</span>
                            </div>
                            <a href={headline.url} target="_blank" className="ml-4 p-3 rounded-full border border-white/10 hover:bg-white hover:text-black transition-all">
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                            </a>
                          </div>
                        </motion.div>
                      </div>

                      <div className="absolute right-8 bottom-20 hidden md:block opacity-30">
                        <div className="text-[8px] font-black uppercase tracking-[0.6em] origin-right rotate-90 whitespace-nowrap translate-y-full">
                          {activeCat.id} // TRANSMISSION ACTIVE
                        </div>
                      </div>
                    </section>
                  )}

                  <section className="px-6 md:px-16 py-20 max-w-[1400px] mx-auto bg-black relative z-20">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16">
                      {news.map((item, i) => (
                        <motion.article 
                          key={item.id + i} 
                          initial={{ opacity: 0, y: 20 }} 
                          whileInView={{ opacity: 1, y: 0 }}
                          viewport={{ once: true, margin: "-50px" }}
                          transition={{ delay: (i % 3) * 0.1 }}
                          className="group cursor-pointer border-t border-white/10 pt-10"
                          onClick={() => window.open(item.url, '_blank')}
                        >
                          <div className="flex items-center justify-between mb-5">
                            <span className="text-[9px] font-black uppercase tracking-[0.2em] px-2 py-0.5 rounded-sm bg-white/5" style={{color: item.color}}>{item.category}</span>
                            <span className="text-[9px] font-bold text-white/20 uppercase tracking-widest">{item.timeAgo}</span>
                          </div>
                          
                          <h3 className="text-xl font-black uppercase leading-[1.2] tracking-tight mb-5 group-hover:text-white/70 transition-colors">
                            {item.title}
                          </h3>
                          
                          <p className="text-[12px] leading-relaxed text-neutral-400 font-medium italic line-clamp-3 opacity-60 group-hover:opacity-100 transition-opacity">
                            {item.excerpt}
                          </p>
                          
                          <div className="mt-6 text-[9px] font-black uppercase tracking-[0.3em] text-white/20 group-hover:text-white transition-colors">
                            Leer Despacho →
                          </div>
                        </motion.article>
                      ))}
                    </div>
                  </section>
                </motion.div>
              )}
            </AnimatePresence>
          </main>

          <footer className="px-6 md:px-16 py-24 border-t border-white/5 bg-black flex flex-col md:flex-row justify-between items-center gap-10 opacity-30 hover:opacity-100 transition-opacity duration-700">
            <div className="flex flex-col items-center md:items-start gap-4">
              <AstrakLogo className="w-10 h-10 grayscale" />
              <span className="text-[8px] font-black uppercase tracking-[0.5em]">Terminal V.4.0.2</span>
            </div>
            <div className="flex gap-8 text-[9px] font-black uppercase tracking-widest text-white/50">
              <a href="#" className="hover:text-white">Protocolos</a>
              <a href="#" className="hover:text-white">Señal Primaria</a>
              <a href="#" className="hover:text-white">Cine</a>
              <a href="#" className="hover:text-white">Música</a>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
