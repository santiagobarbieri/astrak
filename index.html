<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRAK | High-Frequency Signal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <!-- Dependencias -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --astrak-yellow: #e2ff00; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .font-black { font-weight: 900; }
        .tracking-tightest { letter-spacing: -0.07em; }
        .leading-tightest { line-height: 0.75; }
        
        /* Ocultar scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        .astrak-field {
            width: 100%;
            background: transparent;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding: 1.5rem 0;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }
        .astrak-field:focus { border-color: white; padding-left: 1rem; }

        .nav-pill {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            z-index: -1;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Definición de categorías y datos
        const CATEGORIES = [
            { id: 'TODAS', color: '#e2ff00', rss: 'https://www.lanacion.com.ar/arc/cloud/rss/category/ultimas-noticias/' },
            { id: 'POLÍTICA', color: '#3b82f6', rss: 'https://www.lanacion.com.ar/arc/cloud/rss/category/politica/' },
            { id: 'TECNOLOGÍA', color: '#a855f7', rss: 'https://www.infobae.com/teleshow/tecnologia/rss' },
            { id: 'ECONOMÍA', color: '#10b981', rss: 'https://www.lanacion.com.ar/arc/cloud/rss/category/economia/' },
            { id: 'MUNDO', color: '#f59e0b', rss: 'https://www.lanacion.com.ar/arc/cloud/rss/category/el-mundo/' },
            { id: 'ENTRETENIMIENTO', color: '#ec4899', type: 'SPECIAL' }
        ];

        const ENT_DATA = {
            movies: [
                { title: "Dune: Part Two", year: 2024, rating: 9.1, genre: "SCI-FI", img: "https://images.unsplash.com/photo-1485846234645-a62644f84728" },
                { title: "Civil War", year: 2024, rating: 8.2, genre: "THRILLER", img: "https://images.unsplash.com/photo-1536440136628-849c177e76a1" },
                { title: "Oppenheimer", year: 2023, rating: 8.9, genre: "BIOPIC", img: "https://images.unsplash.com/photo-1440404653325-ab127d49abc1" }
            ],
            music: [
                { artist: "Justice", track: "Generator", album: "Hyperdrama", img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745" },
                { artist: "Gesaffelstein", track: "Hard dreams", album: "Gamma", img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9" }
            ]
        };

        const App = () => {
            const [activeCat, setActiveCat] = useState(CATEGORIES[0]);
            const [news, setNews] = useState([]);
            const [loading, setLoading] = useState(true);
            const [time, setTime] = useState(new Date());
            const [weather, setWeather] = useState({ temp: '--', label: 'SYNCING' });
            const [libsReady, setLibsReady] = useState(false);

            // Verificar si las librerías externas están cargadas
            useEffect(() => {
                const checkLibs = () => {
                    if (window.FramerMotion) {
                        setLibsReady(true);
                    } else {
                        setTimeout(checkLibs, 50);
                    }
                };
                checkLibs();
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                fetchWeather();
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (activeCat.type !== 'SPECIAL') fetchNews();
                else setLoading(false);
            }, [activeCat]);

            const fetchWeather = async () => {
                try {
                    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-34.60&longitude=-58.38&current_weather=true');
                    const data = await res.json();
                    setWeather({ temp: Math.round(data.current_weather.temperature), label: 'BS_AS' });
                } catch (e) { console.error("Weather error"); }
            };

            const fetchNews = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(activeCat.rss)}&api_key=00000000000000000000000000000000&t=${Date.now()}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        const items = data.items.map((item, idx) => ({
                            title: item.title,
                            excerpt: item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...',
                            source: data.feed.title.split(' - ')[0],
                            url: item.link,
                            image: `https://images.unsplash.com/photo-${1500000000000 + (idx * 54321)}?auto=format&fit=crop&w=1200&q=80`
                        }));
                        setNews(items);
                    }
                } catch (e) { console.error("RSS Error"); }
                setLoading(false);
            };

            const randomEnt = useMemo(() => ({
                movie: ENT_DATA.movies[Math.floor(Math.random() * ENT_DATA.movies.length)],
                music: ENT_DATA.music[Math.floor(Math.random() * ENT_DATA.music.length)]
            }), [activeCat]);

            // Fallback si Framer Motion aún no está disponible
            if (!libsReady || !window.FramerMotion) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center">
                        <div className="text-[10px] font-black tracking-[1em] text-neutral-500 animate-pulse">ASTRAK_LOADING_LIBS...</div>
                    </div>
                );
            }

            const { motion, AnimatePresence } = window.FramerMotion;

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="sticky top-0 z-[100] bg-white text-black px-6 py-4 flex justify-between items-center border-b border-black/10">
                        <div className="flex items-center gap-12">
                            <h1 className="text-3xl font-black tracking-tightest italic">ASTRAK_</h1>
                            <nav className="hidden md:flex items-center gap-2">
                                {CATEGORIES.map(cat => (
                                    <button 
                                        key={cat.id}
                                        onClick={() => setActiveCat(cat)}
                                        className={`relative px-5 py-2 text-[10px] font-black uppercase tracking-widest transition-all ${activeCat.id === cat.id ? 'text-black' : 'text-neutral-400 hover:text-black'}`}
                                    >
                                        <span className="relative z-10">{cat.id}</span>
                                        {activeCat.id === cat.id && (
                                            <motion.div layoutId="pill" className="nav-pill" style={{ backgroundColor: cat.color }} />
                                        )}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="flex items-center gap-8 text-[10px] font-black uppercase tracking-widest opacity-60">
                            <div className="flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-black rounded-full animate-pulse"></span>
                                {weather.label} / {weather.temp}°C
                            </div>
                            <div className="font-mono">{time.toLocaleTimeString('en-GB')} / UTC</div>
                        </div>
                    </header>

                    {/* Loader */}
                    <AnimatePresence>
                        {loading && (
                            <motion.div 
                                key="loader"
                                initial={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[200] bg-black flex items-center justify-center"
                            >
                                <div className="text-[10px] font-black tracking-[1em] animate-pulse-slow text-neutral-500">ASTRAK_SYNCING...</div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Main Content */}
                    <main className="flex-grow">
                        {activeCat.type === 'SPECIAL' ? (
                            <div className="p-10 md:p-32 space-y-48">
                                <section className="grid lg:grid-cols-2 gap-24 items-center">
                                    <motion.div initial={{ x: -50, opacity: 0 }} whileInView={{ x: 0, opacity: 1 }}>
                                        <h2 className="text-[140px] font-black italic tracking-tightest leading-tightest mb-8 text-white">SCREEN</h2>
                                        <div className="space-y-4">
                                            <span className="text-xs font-black opacity-30 tracking-[0.5em] uppercase">Recommended_Pick</span>
                                            <h3 className="text-6xl font-black italic uppercase">{randomEnt.movie.title}</h3>
                                            <div className="flex gap-8 text-[10px] font-black opacity-50 uppercase tracking-widest italic">
                                                <span>Year: {randomEnt.movie.year}</span>
                                                <span>Rating: {randomEnt.movie.rating}</span>
                                                <span>Genre: {randomEnt.movie.genre}</span>
                                            </div>
                                        </div>
                                    </motion.div>
                                    <div className="aspect-video bg-neutral-900 overflow-hidden grayscale brightness-50">
                                        <img src={randomEnt.movie.img} className="w-full h-full object-cover" />
                                    </div>
                                </section>

                                <section className="grid lg:grid-cols-2 gap-24 items-center">
                                    <div className="aspect-square bg-neutral-900 overflow-hidden order-2 lg:order-1 grayscale brightness-50">
                                        <img src={randomEnt.music.img} className="w-full h-full object-cover" />
                                    </div>
                                    <motion.div initial={{ x: 50, opacity: 0 }} whileInView={{ x: 0, opacity: 1 }} className="order-1 lg:order-2">
                                        <h2 className="text-[140px] font-black italic tracking-tightest leading-tightest mb-8 text-right lg:text-left text-white">SOUND</h2>
                                        <div className="space-y-4 text-right lg:text-left">
                                            <span className="text-xs font-black opacity-30 tracking-[0.5em] uppercase">Sonic_Pulse</span>
                                            <h3 className="text-6xl font-black italic uppercase">{randomEnt.music.track}</h3>
                                            <p className="text-2xl font-black text-neutral-500 italic uppercase">{randomEnt.music.artist}</p>
                                        </div>
                                    </motion.div>
                                </section>
                            </div>
                        ) : (
                            <AnimatePresence mode="wait">
                                {news.length > 0 && (
                                    <motion.div 
                                        key={activeCat.id}
                                        initial={{ opacity: 0 }}
                                        animate={{ opacity: 1 }}
                                        exit={{ opacity: 0 }}
                                    >
                                        <section className="relative h-[90vh] flex flex-col justify-end p-8 md:p-20 overflow-hidden">
                                            <div className="absolute inset-0 z-0">
                                                <img src={news[0].image} className="w-full h-full object-cover grayscale brightness-[0.25]" />
                                                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                                            </div>
                                            <motion.div 
                                                initial={{ y: 100, opacity: 0 }} animate={{ y: 0, opacity: 1 }}
                                                className="relative z-10 grid lg:grid-cols-2 items-end gap-12"
                                            >
                                                <div className="space-y-6">
                                                    <span className="inline-block px-4 py-1 text-[10px] font-black uppercase tracking-[0.3em]" style={{ backgroundColor: activeCat.color, color: '#000' }}>{activeCat.id}</span>
                                                    <h2 className="text-6xl md:text-[120px] font-black leading-[0.8] tracking-tightest italic uppercase underline decoration-white/10">
                                                        {news[0].title}
                                                    </h2>
                                                </div>
                                                <div className="flex flex-col items-end text-right space-y-6">
                                                    <p className="text-neutral-400 text-lg italic max-w-md leading-relaxed uppercase">"{news[0].excerpt}"</p>
                                                    <a href={news[0].url} target="_blank" className="text-xs font-black uppercase tracking-[0.4em] underline decoration-2 underline-offset-8 hover:text-neutral-300 transition-colors">
                                                        READ_FULL_TRANSMISSION ↗
                                                    </a>
                                                </div>
                                            </motion.div>
                                        </section>

                                        <section className="max-w-screen-2xl mx-auto px-8 py-32">
                                            <div className="flex justify-between items-center mb-16 border-b border-white/10 pb-8">
                                                <span className="text-xs font-black uppercase tracking-[0.6em] text-neutral-600 italic">Feed_Chronology</span>
                                                <span className="text-[10px] font-black uppercase opacity-30 font-mono tracking-widest">{activeCat.id}_CHANNEL_ACTIVE</span>
                                            </div>
                                            <div className="divide-y divide-white/5">
                                                {news.slice(1).map((item, idx) => (
                                                    <motion.div 
                                                        key={idx}
                                                        initial={{ opacity: 0, y: 20 }}
                                                        whileInView={{ opacity: 1, y: 0 }}
                                                        viewport={{ once: true }}
                                                        className="group py-16 flex flex-col lg:flex-row justify-between items-start gap-12 hover:bg-white/[0.02] transition-all px-4"
                                                    >
                                                        <div className="max-w-4xl">
                                                            <h3 className="text-4xl md:text-7xl font-black tracking-tightest leading-[0.85] italic uppercase group-hover:text-neutral-300 transition-colors mb-6 text-white">
                                                                {item.title}
                                                            </h3>
                                                            <p className="text-neutral-600 text-xl italic font-medium opacity-60">"{item.excerpt}"</p>
                                                        </div>
                                                        <div className="flex flex-col items-end justify-between self-stretch">
                                                            <span className="text-[10px] font-black opacity-20 tracking-widest uppercase">Source: {item.source}</span>
                                                            <a href={item.url} target="_blank" className="p-6 rounded-full border border-white/10 group-hover:bg-white group-hover:text-black transition-all">
                                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                                            </a>
                                                        </div>
                                                    </motion.div>
                                                ))}
                                            </div>
                                        </section>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-black border-t border-white/10 p-12 md:p-24">
                        <div className="max-w-screen-2xl mx-auto grid lg:grid-cols-2 gap-32">
                            <div className="space-y-12">
                                <h4 className="text-[100px] font-black italic tracking-tightest leading-none text-white">ASTRAK_</h4>
                                <div className="grid grid-cols-2 gap-12">
                                    <div className="space-y-4">
                                        <h5 className="text-[10px] font-black uppercase tracking-[0.4em] text-neutral-500">System_Core</h5>
                                        <p className="text-xs text-neutral-600 italic uppercase leading-relaxed">Sintetizador de señales de alta frecuencia. Los datos se extraen de nodos globales sin intervención editorial.</p>
                                    </div>
                                    <div className="space-y-4">
                                        <h5 className="text-[10px] font-black uppercase tracking-[0.4em] text-neutral-500">Channels</h5>
                                        <div className="flex flex-col gap-2 text-[10px] font-black uppercase tracking-widest">
                                            <span className="hover:text-white cursor-pointer transition-colors text-neutral-700">Instagram_Signal</span>
                                            <span className="hover:text-white cursor-pointer transition-colors text-neutral-700">X_Node</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-12">
                                <h4 className="text-3xl font-black italic uppercase underline underline-offset-[12px] decoration-1 text-white">Feedback_Signal</h4>
                                <form className="space-y-6" onSubmit={e => e.preventDefault()}>
                                    <input type="text" placeholder="Operator_Name" className="astrak-field" />
                                    <input type="email" placeholder="Signal_Node_Email" className="astrak-field" />
                                    <button className="w-full py-6 bg-white text-black font-black uppercase text-[10px] tracking-[0.5em] hover:bg-neutral-300 transition-all">Transmit_Data</button>
                                </form>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
