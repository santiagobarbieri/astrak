<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ASTRAK - Sintetizador de noticias de alta frecuencia en tiempo real">
    <meta name="theme-color" content="#000000">
    
    <title>ASTRAK | High-Frequency Signal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/favicon.png">
    
    <!-- Librerías Externas -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Tailwind CSS v3 - Optimizado para producción -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/tailwind.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        :root {
            --astrak-black: #000;
            --astrak-white: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--astrak-black);
            color: var(--astrak-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .font-black { font-weight: 900; }
        .tracking-tightest { letter-spacing: -0.06em; }
        .leading-tightest { line-height: 0.85; }

        /* Scrollbar estilizado */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Animaciones Meteorológicas */
        @keyframes rain-fall {
            0% { transform: translateY(-120vh) rotate(15deg); }
            100% { transform: translateY(120vh) rotate(15deg); }
        }
        .rain-drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255,255,255,0.2));
            width: 1px;
            height: 80px;
            animation: rain-fall 0.7s linear infinite;
        }

        @keyframes cloud-drift {
            from { transform: translateX(-20%) scale(1); }
            to { transform: translateX(120%) scale(1.1); }
        }
        .cloud-element {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: cloud-drift 80s linear infinite;
        }

        @keyframes lightning-bolt {
            0%, 94%, 100% { opacity: 0; }
            96% { opacity: 1; background: #fff; }
            97% { opacity: 0.2; }
            98% { opacity: 0.8; background: #e0f2fe; }
        }
        .lightning-effect {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            animation: lightning-bolt 6s ease-in-out infinite;
        }

        @keyframes snow-fall {
            0% { transform: translateY(-120vh) translateX(0px); opacity: 1; }
            100% { transform: translateY(120vh) translateX(100px); opacity: 0; }
        }
        .snow-flake {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,255,255,0.3));
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: snow-fall 8s linear infinite;
        }

        .analog-noise {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 20;
        }

        .gradient-vignette {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,1) 100%);
        }

        .loader-ring {
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: #fff;
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .astrak-field {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 0;
            width: 100%;
            outline: none;
            font-size: 0.8rem;
            color: #fff;
            transition: border-color 0.4s ease;
        }
        .astrak-field:focus {
            border-bottom-color: #fff;
        }
        .astrak-field::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Logo styling */
        .astrak-logo {
            height: 40px;
            width: auto;
            transition: opacity 0.3s ease;
        }
        .astrak-logo:hover {
            opacity: 0.8;
        }

        /* Error state */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }

        /* Filter pill con animación refinada */
        .filter-nav {
            display: flex;
            gap: 0.125rem;
            position: relative;
        }

        .filter-button {
            position: relative;
            z-index: 10;
            padding: 0.5rem 0.75rem;
            font-size: 0.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            background: transparent;
            color: rgba(163, 230, 53, 0.4);
        }

        .filter-button.active {
            color: #000;
        }

        .filter-button:hover:not(.active) {
            color: rgba(163, 230, 53, 0.7);
        }

        .filter-pill-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-radius: 9999px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        /* Mobile filter menu */
        .mobile-filter-toggle {
            display: none;
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mobile-filter-toggle:hover {
            border-color: rgba(255,255,255,0.4);
        }

        .mobile-filter-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 50;
            padding: 2rem 1.5rem;
            overflow-y: auto;
        }

        .mobile-filter-menu.active {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mobile-filter-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .astrak-logo {
                height: 32px;
            }

            .mobile-filter-toggle {
                display: block;
            }

            .filter-nav {
                display: none;
            }

            .mobile-filter-menu .filter-button {
                padding: 1rem;
                font-size: 1rem;
                width: 100%;
                text-align: left;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
        }

        /* Entertainment card */
        .entertainment-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
        }

        .entertainment-card:hover {
            border-color: rgba(255,255,255,0.3);
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            transform: translateY(-4px);
        }

        .entertainment-rating {
            display: inline-flex;
            gap: 2px;
            font-size: 0.875rem;
        }

        .star {
            color: #e2ff00;
        }

        .star.empty {
            color: rgba(255,255,255,0.2);
        }

        /* Weather info badge */
        .weather-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .weather-icon {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const MotionLib = window.FramerMotion || window.Motion;
        const { motion, AnimatePresence } = MotionLib;

        const CATEGORIES = [
            { id: 'ALL', color: '#e2ff00', query: 'https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'POLITICS', color: '#3b82f6', query: 'https://news.google.com/rss/headlines/section/topic/POLITICS?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'TECH', color: '#a855f7', query: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'ECONOMY', color: '#10b981', query: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'WORLD', color: '#f59e0b', query: 'https://news.google.com/rss/headlines/section/topic/WORLD?hl=es-419&gl=AR&ceid=AR:es-419' },
            { id: 'CULTURE', color: '#ec4899', query: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=es-419&gl=AR&ceid=AR:es-419' }
        ];

        const ENTERTAINMENT_DATA = [
            { id: 1, title: 'Oppenheimer', type: 'PELÍCULA', rating: 5, genre: 'Drama/Thriller', year: 2023, description: 'Una épica biográfica sobre el físico que cambió la historia.' },
            { id: 2, title: 'Blinding Lights', type: 'MÚSICA', artist: 'The Weeknd', rating: 5, genre: 'Synthwave/Pop', year: 2019, description: 'Uno de los singles más influyentes de la década.' },
            { id: 3, title: 'Dune: Part Two', type: 'PELÍCULA', rating: 4.5, genre: 'Sci-Fi', year: 2024, description: 'La secuela épica de Denis Villeneuve llega a nuevas alturas.' },
            { id: 4, title: 'Flowers', type: 'MÚSICA', artist: 'Miley Cyrus', rating: 4.5, genre: 'Pop', year: 2023, description: 'Tema de resurgimiento y libertad personal.' },
            { id: 5, title: 'The Brutal Truth', type: 'PODCAST', creator: 'Joe Rogan', rating: 4, genre: 'Entrevistas', description: 'Conversaciones profundas con personajes influyentes.' },
            { id: 6, title: 'Past Lives', type: 'PELÍCULA', rating: 4.5, genre: 'Romance/Drama', year: 2023, description: 'Un viaje emocional sobre destino y elecciones.' },
            { id: 7, title: 'Vampire', type: 'MÚSICA', artist: 'Olivia Rodrigo', rating: 4, genre: 'Alt/Pop', year: 2024, description: 'Narrativa oscura con producción de primera clase.' },
            { id: 8, title: 'The Midnight Club', type: 'SERIE', rating: 4, genre: 'Suspenso/Horror', year: 2023, description: 'Misterio y secretos en una casa para ancianos.' }
        ];

        // Función para formatear tiempo
        const getTimeAgo = (pubDate) => {
            const now = new Date();
            const published = new Date(pubDate);
            const diffInMs = now - published;
            const diffInMins = Math.floor(diffInMs / (1000 * 60));
            const diffInHours = Math.floor(diffInMins / 60);

            if (diffInMins < 1) return "hace unos segundos";
            if (diffInMins < 60) return `hace ${diffInMins} min`;
            if (diffInHours < 24) return `hace ${diffInHours} h`;
            return `hace ${Math.floor(diffInHours / 24)} d`;
        };

        // Función para obtener clima basado en ubicación
        const fetchWeatherData = useCallback(async (setWeather) => {
            try {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const { latitude, longitude } = position.coords;
                            
                            try {
                                const response = await fetch(
                                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code,relative_humidity,wind_speed_10m&temperature_unit=celsius&timezone=auto`
                                );
                                const data = await response.json();
                                const current = data.current;
                                
                                let weatherType = 'clear';
                                let weatherIcon = '☀️';
                                
                                if (current.weather_code >= 80 && current.weather_code <= 82) {
                                    weatherType = 'rain';
                                    weatherIcon = '🌧️';
                                } else if (current.weather_code >= 71 && current.weather_code <= 77) {
                                    weatherType = 'snow';
                                    weatherIcon = '❄️';
                                } else if (current.weather_code >= 51 && current.weather_code <= 67) {
                                    weatherType = 'drizzle';
                                    weatherIcon = '🌦️';
                                } else if (current.weather_code >= 1 && current.weather_code <= 3) {
                                    weatherType = 'cloudy';
                                    weatherIcon = '☁️';
                                }

                                setWeather({
                                    type: weatherType,
                                    temp: Math.round(current.temperature_2m),
                                    humidity: current.relative_humidity,
                                    windSpeed: Math.round(current.wind_speed_10m),
                                    icon: weatherIcon
                                });
                            } catch (err) {
                                console.error('Error fetching weather:', err);
                            }
                        },
                        () => {
                            setWeather({
                                type: 'clear',
                                temp: 22,
                                humidity: 60,
                                windSpeed: 5,
                                icon: '☀️'
                            });
                        }
                    );
                }
            } catch (err) {
                console.error('Geolocation error:', err);
            }
        }, []);

        // Generador de lluvia
        const RainDrops = () => {
            const drops = useMemo(() => 
                Array.from({ length: 30 }).map((_, i) => ({
                    id: i,
                    left: Math.random() * 100,
                    delay: Math.random() * 2,
                    duration: 0.7 + Math.random() * 0.3
                })), []
            );

            return drops.map(drop => (
                <div
                    key={drop.id}
                    className="rain-drop"
                    style={{
                        left: `${drop.left}%`,
                        animationDelay: `${drop.delay}s`,
                        animationDuration: `${drop.duration}s`
                    }}
                />
            ));
        };

        // Generador de nieve
        const SnowFlakes = () => {
            const flakes = useMemo(() =>
                Array.from({ length: 50 }).map((_, i) => ({
                    id: i,
                    left: Math.random() * 100,
                    delay: Math.random() * 4,
                    duration: 8 + Math.random() * 4,
                    size: 2 + Math.random() * 6
                })), []
            );

            return flakes.map(flake => (
                <div
                    key={flake.id}
                    className="snow-flake"
                    style={{
                        left: `${flake.left}%`,
                        animationDelay: `${flake.delay}s`,
                        animationDuration: `${flake.duration}s`,
                        width: `${flake.size}px`,
                        height: `${flake.size}px`
                    }}
                />
            ));
        };

        // Componente de nubes
        const CloudLayer = () => {
            const clouds = useMemo(() =>
                Array.from({ length: 5 }).map((_, i) => ({
                    id: i,
                    top: Math.random() * 60,
                    size: 150 + Math.random() * 200,
                    duration: 60 + Math.random() * 40
                })), []
            );

            return clouds.map(cloud => (
                <div
                    key={cloud.id}
                    className="cloud-element"
                    style={{
                        top: `${cloud.top}%`,
                        width: `${cloud.size}px`,
                        height: `${cloud.size * 0.6}px`,
                        animationDuration: `${cloud.duration}s`
                    }}
                />
            ));
        };

        // Componente de atmosfera adaptativa
        const Atmosphere = ({ time, weather }) => {
            const shouldShowLightning = useMemo(() =>
                Math.random() > 0.85 && weather.type === 'rain', [weather]
            );

            return (
                <>
                    <div className="absolute inset-0 gradient-vignette z-10" />
                    <div className="absolute inset-0 overflow-hidden">
                        <CloudLayer />
                        {weather.type === 'rain' && <RainDrops />}
                        {weather.type === 'snow' && <SnowFlakes />}
                        {shouldShowLightning && <div className="lightning-effect" />}
                    </div>
                    <div className="analog-noise" />
                </>
            );
        };

        // Componente de tarjeta de entretenimiento
        const EntertainmentCard = ({ item }) => {
            const renderStars = (rating) => {
                return Array(5).fill(0).map((_, i) => (
                    <span key={i} className={i < Math.floor(rating) ? 'star' : i < rating ? 'star' : 'star empty'}>
                        ★
                    </span>
                ));
            };

            return (
                <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    className="entertainment-card p-6 rounded-lg"
                >
                    <div className="flex items-start justify-between mb-4">
                        <div>
                            <span className="text-[8px] font-black uppercase tracking-[0.2em] text-purple-400 mb-2 block">
                                {item.type}
                            </span>
                            <h3 className="text-xl font-black uppercase tracking-tighter mb-2">
                                {item.title}
                            </h3>
                        </div>
                    </div>
                    
                    <div className="space-y-3">
                        <div className="entertainment-rating">
                            {renderStars(item.rating)}
                            <span className="text-[12px] opacity-60 ml-2">{item.rating}/5</span>
                        </div>
                        
                        <p className="text-[12px] text-neutral-400 italic">
                            {item.description}
                        </p>
                        
                        <div className="flex flex-wrap gap-2 pt-2">
                            <span className="text-[10px] px-2 py-1 bg-white/5 rounded font-bold">
                                {item.genre || item.artist}
                            </span>
                            {item.year && (
                                <span className="text-[10px] px-2 py-1 bg-white/5 rounded font-bold opacity-60">
                                    {item.year}
                                </span>
                            )}
                        </div>
                    </div>
                </motion.div>
            );
        };

        // Componente principal
        const App = () => {
            const [filter, setFilter] = useState(CATEGORIES[0]);
            const [news, setNews] = useState([]);
            const [headline, setHeadline] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [time, setTime] = useState(new Date());
            const [weather, setWeather] = useState({ type: 'clear', temp: 22, humidity: 60, windSpeed: 5, icon: '☀️' });
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [pillPosition, setPillPosition] = useState({ width: 0, left: 0 });
            const filterNavRef = useRef(null);

            // Actualizar reloj
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Cargar clima al montar
            useEffect(() => {
                fetchWeatherData(setWeather);
            }, [fetchWeatherData]);

            // Actualizar posición del pill
            useEffect(() => {
                if (filterNavRef.current) {
                    const activeButton = filterNavRef.current.querySelector('.filter-button.active');
                    if (activeButton) {
                        const { width, left } = activeButton.getBoundingClientRect();
                        const navLeft = filterNavRef.current.getBoundingClientRect().left;
                        setPillPosition({
                            width: width,
                            left: left - navLeft
                        });
                    }
                }
            }, [filter]);

            // Fetch de noticias
            const fetchNews = useCallback(async (category) => {
                setIsLoading(true);
                setError(null);
                try {
                    const corsProxy = 'https://api.allorigins.win/get?url=';
                    const encodedUrl = encodeURIComponent(category.query);
                    const response = await fetch(corsProxy + encodedUrl);
                    
                    if (!response.ok) {
                        throw new Error(`Error HTTP: ${response.status}`);
                    }

                    const data = await response.json();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data.contents, 'text/xml');

                    if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                        throw new Error('Error al parsear el RSS');
                    }

                    const items = Array.from(xmlDoc.getElementsByTagName('item')).slice(0, 10);
                    const newsItems = items.map((item, idx) => {
                        const title = item.querySelector('title')?.textContent || 'Título no disponible';
                        const link = item.querySelector('link')?.textContent || '#';
                        const pubDate = item.querySelector('pubDate')?.textContent || new Date().toISOString();
                        const description = item.querySelector('description')?.textContent || 'Sin descripción';

                        return {
                            id: `${category.id}-${idx}`,
                            title: title.slice(0, 120),
                            excerpt: description.replace(/<[^>]*>/g, '').slice(0, 150),
                            url: link,
                            source: item.querySelector('source > title')?.textContent || 'Fuente',
                            category: category.id,
                            color: category.color,
                            pubDate: pubDate,
                            timeAgo: getTimeAgo(pubDate)
                        };
                    });

                    setNews(newsItems);
                    setHeadline(newsItems[0] || null);

                } catch (err) {
                    console.error('Error fetching news:', err);
                    setError('No se pudieron cargar las noticias. Intenta de nuevo.');
                    setNews([]);
                    setHeadline(null);
                } finally {
                    setIsLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchNews(filter);
            }, [filter, fetchNews]);

            const handleCategoryChange = (category) => {
                setFilter(category);
                setMobileMenuOpen(false);
            };

            return (
                <div className="relative bg-black text-white min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-40 border-b border-white/[0.05] bg-black/80 backdrop-blur-sm px-8 md:px-16 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between gap-8 mb-6">
                            <a href="#" className="flex-shrink-0" aria-label="ASTRAK">
                                <img src="img/logo.png" alt="ASTRAK Logo" className="astrak-logo" onError={(e) => e.target.style.display = 'none'} />
                            </a>
                            
                            <h1 className="text-2xl md:text-4xl font-black tracking-tightest uppercase flex-1">
                                ASTRAK
                            </h1>
                            
                            <div className="hidden md:flex items-center gap-4 text-[9px] font-black uppercase tracking-widest opacity-60">
                                <span>{weather.icon} {weather.temp}°C</span>
                                <span className="w-px h-3 bg-white/10"></span>
                                <span>SIGNAL V2</span>
                            </div>
                        </div>

                        {/* Filtros y controles */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            {/* Filtros Desktop */}
                            <div className="relative w-full md:w-auto" ref={filterNavRef}>
                                <div className="filter-nav">
                                    {CATEGORIES.map((cat) => (
                                        <button
                                            key={cat.id}
                                            onClick={() => handleCategoryChange(cat)}
                                            className={`filter-button ${filter.id === cat.id ? 'active' : ''}`}
                                            aria-pressed={filter.id === cat.id}
                                        >
                                            {cat.id}
                                        </button>
                                    ))}
                                    <div 
                                        className="filter-pill-bg" 
                                        style={{
                                            width: `${pillPosition.width}px`,
                                            left: `${pillPosition.left}px`,
                                            backgroundColor: filter.color,
                                        }}
                                    />
                                </div>
                            </div>

                            {/* Botón móvil */}
                            <button 
                                className="mobile-filter-toggle md:hidden"
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                aria-label="Abrir filtros"
                            >
                                ☰ {filter.id}
                            </button>

                            {/* Información de hora y clima */}
                            <div className="text-[9px] font-black uppercase tracking-widest opacity-60 flex items-center gap-4">
                                <span>{time.getHours() >= 12 ? 'PM' : 'AM'}</span>
                                <span className="w-px h-3 bg-white/10"></span>
                                <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                        </div>
                    </header>

                    {/* Menú de filtros móvil */}
                    <AnimatePresence>
                        {mobileMenuOpen && (
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="mobile-filter-menu active"
                            >
                                <button
                                    className="mobile-filter-close"
                                    onClick={() => setMobileMenuOpen(false)}
                                >
                                    ✕
                                </button>
                                
                                <div className="mt-12">
                                    <h3 className="text-sm font-black uppercase tracking-widest mb-8 opacity-60">
                                        Selecciona una categoría
                                    </h3>
                                    <div className="space-y-4">
                                        {CATEGORIES.map((cat) => (
                                            <motion.button
                                                key={cat.id}
                                                onClick={() => handleCategoryChange(cat)}
                                                className={`w-full text-left py-4 px-6 rounded-lg font-black uppercase tracking-[0.2em] transition-all ${
                                                    filter.id === cat.id
                                                        ? 'text-black'
                                                        : 'text-white/40 hover:text-white/80'
                                                }`}
                                                style={{
                                                    backgroundColor: filter.id === cat.id ? cat.color : 'transparent',
                                                    border: filter.id === cat.id ? 'none' : `1px solid rgba(255,255,255,0.1)`
                                                }}
                                                whileHover={{ scale: 1.02 }}
                                                whileTap={{ scale: 0.98 }}
                                            >
                                                {cat.id}
                                            </motion.button>
                                        ))}
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <main>
                        {error && (
                            <div className="px-8 md:px-16 pt-8">
                                <div className="error-message">{error}</div>
                            </div>
                        )}
                        
                        {/* Sección principal de noticias */}
                        <AnimatePresence mode="wait">
                            {isLoading ? (
                                <div className="h-screen flex items-center justify-center">
                                    <div className="loader-ring"></div>
                                </div>
                            ) : (
                                headline && (
                                    <motion.section 
                                        key={headline.id}
                                        initial={{ opacity: 0 }} 
                                        animate={{ opacity: 1 }}
                                        className="relative min-h-[90vh] flex flex-col justify-end px-8 md:px-16 pb-24 pt-40 overflow-hidden"
                                    >
                                        <Atmosphere time={time} weather={weather} />
                                        
                                        <div className="relative z-30 grid grid-cols-1 lg:grid-cols-12 gap-12 items-end">
                                            <div className="lg:col-span-8 max-w-4xl">
                                                <span className="text-[10px] opacity-40 font-bold mb-4 block tracking-[0.3em] uppercase italic">Priority Transmission _</span>
                                                <h2 className="text-4xl md:text-5xl lg:text-6xl font-black leading-tightest tracking-tightest mb-6 uppercase text-white drop-shadow-lg">
                                                    {headline.title}
                                                </h2>
                                                <p className="text-sm md:text-base text-neutral-300 leading-relaxed font-medium italic opacity-80 max-w-xl">
                                                    {headline.excerpt}...
                                                </p>
                                                <div className="weather-badge">
                                                    <span className="weather-icon">{weather.icon}</span>
                                                    <span>{weather.temp}°C • Humedad {weather.humidity}%</span>
                                                </div>
                                            </div>
                                            <div className="lg:col-span-4 flex flex-col items-start lg:items-end text-left lg:text-right space-y-6">
                                                <div className="px-4 py-1 text-[9px] font-black uppercase tracking-[0.3em]" style={{backgroundColor: headline.color, color: '#000'}}>
                                                    {headline.category}
                                                </div>
                                                <div className="space-y-1">
                                                    <div className="text-[10px] font-bold opacity-50 uppercase italic tracking-widest">
                                                        via {headline.source} • {headline.timeAgo}
                                                    </div>
                                                    <div className="text-[8px] font-medium opacity-30 uppercase">Status: Verified Signal</div>
                                                </div>
                                                <a href={headline.url} target="_blank" rel="noopener noreferrer" className="text-[10px] font-black uppercase border-b-2 border-white/20 pb-1 tracking-tighter hover:border-white transition-all">
                                                    Open Preview ↗
                                                </a>
                                            </div>
                                        </div>
                                    </motion.section>
                                )
                            )}
                        </AnimatePresence>

                        {/* Sección de noticias secuenciales */}
                        {!isLoading && news.length > 0 && (
                            <section className="px-8 md:px-16 py-32 bg-black">
                                <div className="max-w-6xl mx-auto">
                                    <div className="flex items-center gap-4 mb-20">
                                        <span className="text-[9px] font-black uppercase tracking-[0.5em] text-neutral-700 italic underline decoration-neutral-800">Sequential_Signals</span>
                                        <div className="h-px flex-grow bg-white/[0.05]"></div>
                                    </div>

                                    <div className="space-y-24">
                                        {news.map((item, idx) => (
                                            <motion.div 
                                                key={item.id}
                                                initial={{ opacity: 0, y: 20 }}
                                                whileInView={{ opacity: 1, y: 0 }}
                                                viewport={{ once: true, margin: "-100px" }}
                                                className="group cursor-pointer border-b border-white/[0.02] pb-16 transition-all hover:opacity-75"
                                                onClick={() => window.open(item.url, '_blank')}
                                                role="article"
                                            >
                                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-12 items-start">
                                                    <div className="lg:col-span-3 space-y-5">
                                                        <div className="flex items-center gap-4 text-[9px] font-black uppercase tracking-widest">
                                                            <span className="font-black" style={{color: item.color}}>{item.category}</span>
                                                            <span className="opacity-40 italic">via {item.source} • {item.timeAgo}</span>
                                                        </div>
                                                        <h3 className="text-2xl md:text-3xl font-black tracking-tighter leading-none uppercase group-hover:opacity-50 transition-all duration-500">
                                                            {item.title}
                                                        </h3>
                                                        <p className="text-neutral-500 text-xs md:text-sm leading-relaxed max-w-3xl opacity-60 italic">
                                                            {item.excerpt}
                                                        </p>
                                                    </div>
                                                    <div className="hidden lg:flex flex-col items-end pt-2">
                                                        <span className="text-[9px] font-bold opacity-10 group-hover:opacity-40 transition-opacity uppercase italic">Node_{idx.toString().padStart(2, '0')}</span>
                                                    </div>
                                                </div>
                                            </motion.div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* Sección de entretenimiento */}
                        <section className="px-8 md:px-16 py-32 bg-black">
                            <div className="max-w-6xl mx-auto">
                                <div className="flex items-center gap-4 mb-20">
                                    <span className="text-[9px] font-black uppercase tracking-[0.5em] text-neutral-700 italic underline decoration-neutral-800">Entertainment_Reviews</span>
                                    <div className="h-px flex-grow bg-white/[0.05]"></div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {ENTERTAINMENT_DATA.map((item) => (
                                        <EntertainmentCard key={item.id} item={item} />
                                    ))}
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="bg-black text-white px-8 md:px-16 py-32 border-t border-white/[0.05]">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-start lg:items-end gap-20">
                            <div className="space-y-12">
                                <img src="img/logo.png" alt="ASTRAK Logo" className="astrak-logo mb-6" onError={(e) => e.target.style.display = 'none'} />
                                <h1 className="text-[80px] md:text-[150px] font-black tracking-tightest leading-[0.7] opacity-10 italic">Astrak</h1>
                                <div className="max-w-md space-y-6">
                                    <h4 className="text-[10px] font-black uppercase tracking-[0.3em] opacity-30 italic">Protocol Documentation_</h4>
                                    <p className="text-[12px] text-neutral-600 leading-relaxed italic">
                                        Astrak es un sintetizador de noticias de alta frecuencia. Los datos son extraídos en tiempo real y la atmósfera del sistema se sincroniza con el horario local.
                                    </p>
                                </div>
                            </div>
                            <div className="w-full lg:w-96 space-y-12">
                                <h4 className="text-4xl font-black italic tracking-tighter uppercase">Signal_Feedback</h4>
                                <div className="space-y-8">
                                    <input type="text" placeholder="Operator_ID" className="astrak-field" aria-label="Operator ID" />
                                    <input type="email" placeholder="node@astrak.io" className="astrak-field" aria-label="Email" />
                                    <button className="w-full py-5 bg-white text-black font-black uppercase text-[10px] tracking-[0.4em] hover:bg-neutral-300 transition-all active:scale-95">
                                        Transmit_Feedback
                                    </button>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
