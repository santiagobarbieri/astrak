<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20fill%3D%27black%27/%3E%3Ccircle%20cx%3D%2732%27%20cy%3D%2732%27%20r%3D%2714%27%20fill%3D%27white%27%20opacity%3D%270.9%27/%3E%3C/svg%3E" />
  <title>Astrak</title>

  <!-- Dependencias -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

    /* =========================================================
       VARIABLES GLOBALES
    ========================================================= */
    :root {
      --astrak-black: #000000;
      --astrak-white: #ffffff;
      --astrak-border-soft: rgba(255, 255, 255, 0.05);
      --astrak-border-faint: rgba(255, 255, 255, 0.02);
      --astrak-text-muted: rgba(255, 255, 255, 0.6);
      --astrak-text-soft: rgba(255, 255, 255, 0.4);
      --astrak-panel-light: rgba(255, 255, 255, 0.9);
      --astrak-input-border: rgba(255, 255, 255, 0.1);
      --astrak-selection-bg: #ffffff;
      --astrak-selection-text: #000000;
    }

    /* =========================================================
       RESET / BASE
    ========================================================= */
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background-color: var(--astrak-black);
      color: var(--astrak-white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: var(--astrak-selection-bg);
      color: var(--astrak-selection-text);
    }

    ::-webkit-scrollbar {
      display: none;
    }

    /* Ocultar scrollbar en contenedores con scroll horizontal */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    /* =========================================================
       UTILIDADES TIPOGRÁFICAS
    ========================================================= */
    .astrak-font-black {
      font-weight: 900;
    }

    .astrak-tracking-tightest {
      letter-spacing: -0.06em;
    }

    .astrak-leading-tightest {
      line-height: 0.85;
    }

    /* =========================================================
       EFECTOS Y ANIMACIONES DE ATMÓSFERA
    ========================================================= */
    @keyframes rain-fall {
      0% {
        transform: translateY(-120vh) rotate(15deg);
      }
      100% {
        transform: translateY(120vh) rotate(15deg);
      }
    }

    @keyframes cloud-drift {
      from {
        transform: translateX(-20%) scale(1);
      }
      to {
        transform: translateX(120%) scale(1.1);
      }
    }

    @keyframes lightning-bolt {
      0%, 94%, 100% {
        opacity: 0;
      }
      96% {
        opacity: 1;
        background: #ffffff;
      }
      97% {
        opacity: 0.2;
      }
      98% {
        opacity: 0.8;
        background: #e0f2fe;
      }
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .rain-drop {
      position: absolute;
      width: 1px;
      height: 80px;
      background: linear-gradient(transparent, rgba(255, 255, 255, 0.2));
      animation: rain-fall 0.7s linear infinite;
    }

    .cloud-element {
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      background: rgba(255, 255, 255, 0.08);
      animation: cloud-drift 80s linear infinite;
    }

    .lightning-effect {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      animation: lightning-bolt 6s ease-in-out infinite;
    }

    .analog-noise {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .gradient-vignette {
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.8) 0%,
        transparent 20%,
        transparent 80%,
        rgba(0, 0, 0, 1) 100%
      );
    }

    .loader-ring {
      width: 2rem;
      height: 2rem;
      border: 2px solid rgba(255, 255, 255, 0.05);
      border-top-color: #ffffff;
      border-radius: 999px;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* =========================================================
       FORMULARIO / INPUTS
    ========================================================= */
    .astrak-field {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--astrak-input-border);
      outline: none;
      background: transparent;
      color: var(--astrak-white);
      font-size: 0.8rem;
      transition: border-color 0.4s ease;
    }

    .astrak-field:focus {
      border-bottom-color: var(--astrak-white);
    }

    .astrak-field::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;
    const MotionLib = window.FramerMotion || window.Motion;
    const { motion, AnimatePresence } = MotionLib;

    /* =========================================================
       CONFIGURACIÓN GENERAL
    ========================================================= */
    const RSS_TO_JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

    const CATEGORIES = [
      {
        id: 'ALL',
        color: '#e2ff00',
        query: 'https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419',
      },
      {
        id: 'POLITICS',
        color: '#3b82f6',
        query: 'https://news.google.com/rss/headlines/section/topic/POLITICS?hl=es-419&gl=AR&ceid=AR:es-419',
      },
      {
        id: 'TECH',
        color: '#a855f7',
        query: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=es-419&gl=AR&ceid=AR:es-419',
      },
      {
        id: 'ECONOMY',
        color: '#10b981',
        query: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=es-419&gl=AR&ceid=AR:es-419',
      },
      {
        id: 'WORLD',
        color: '#f59e0b',
        query: 'https://news.google.com/rss/headlines/section/topic/WORLD?hl=es-419&gl=AR&ceid=AR:es-419',
      },
      {
        id: 'ENTRETENIMIENTO',
        color: '#ff4d8d',
        query: 'https://news.google.com/rss/search?q=musica%20OR%20m%C3%BAsica%20OR%20cine%20OR%20pel%C3%ADculas%20OR%20series%20OR%20streaming%20when%3A7d&hl=es-419&gl=AR&ceid=AR:es-419',
      },
      {
        id: 'CULTURE',
        color: '#ec4899',
        query: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=es-419&gl=AR&ceid=AR:es-419',
      },
    ];

    const FEATURED_CATEGORIES = CATEGORIES.filter((category) => category.id !== 'ALL').slice(0, 4);

    /* =========================================================
       HELPERS
    ========================================================= */
    function getTimeAgo(pubDate) {
      if (!pubDate) return 'reciente';

      const now = new Date();
      const published = new Date(pubDate);
      const diffInMs = now - published;
      const diffInMinutes = Math.floor(diffInMs / (1000 * 60));
      const diffInHours = Math.floor(diffInMinutes / 60);
      const diffInDays = Math.floor(diffInHours / 24);

      if (diffInMinutes < 1) return 'hace unos segundos';
      if (diffInMinutes < 60) return `hace ${diffInMinutes} min`;
      if (diffInHours < 24) return `hace ${diffInHours} horas`;
      return `hace ${diffInDays} días`;
    }

    function extractSourceAndTitle(rawTitle = '') {
      const titleParts = rawTitle.split(' - ');
      const cleanTitle = titleParts[0]?.trim() || 'Sin título';
      const source = titleParts.length > 1 ? titleParts[titleParts.length - 1].trim() : 'Fuente Global';

      return { cleanTitle, source };
    }

    function stripHtml(text = '') {
      return text.replace(/<[^>]*>?/gm, ' ').replace(/\s+/g, ' ').trim();
    }

    function escapeSvgText(text = '') {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function createFallbackImage(categoryId, color) {
      const safeCategory = escapeSvgText(categoryId || 'ASTRAK');
      const safeColor = color || '#ffffff';
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
          <defs>
            <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#000000"/>
              <stop offset="100%" stop-color="#111111"/>
            </linearGradient>
          </defs>
          <rect width="1200" height="900" fill="url(#bg)"/>
          <circle cx="960" cy="180" r="220" fill="${safeColor}" opacity="0.18"/>
          <circle cx="180" cy="760" r="260" fill="${safeColor}" opacity="0.12"/>
          <rect x="72" y="72" width="1056" height="756" rx="28" fill="none" stroke="rgba(255,255,255,0.16)"/>
          <text x="90" y="140" fill="white" opacity="0.48" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="8">ASTRAK</text>
          <text x="90" y="760" fill="${safeColor}" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" letter-spacing="3">${safeCategory}</text>
          <text x="90" y="820" fill="white" opacity="0.62" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">Live headline visual unavailable</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function extractImageFromDescription(description = '') {
      const imageMatch = description.match(/<img[^>]+src=["']([^"']+)["']/i);
      return imageMatch?.[1] || null;
    }

    function extractImageUrl(item = {}) {
      return (
        item.thumbnail ||
        item.enclosure?.link ||
        item.enclosure?.url ||
        item['media:content']?.url ||
        item['media:thumbnail']?.url ||
        extractImageFromDescription(item.description) ||
        null
      );
    }

    function cleanExcerpt(description = '', title = '', source = '') {
      let text = stripHtml(description || '');
      const unwanted = [title, source, `${title} - ${source}`, `${source} - ${title}`].filter(Boolean);

      unwanted.forEach((chunk) => {
        const safe = chunk.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        text = text.replace(new RegExp(safe, 'ig'), ' ');
      });

      text = text
        .replace(/^\s*[•\-:|]+\s*/g, '')
        .replace(/\s+/g, ' ')
        .trim();

      if (!text || text.length < 24) {
        return 'Actualización rápida curada desde la señal principal de Astrak.';
      }

      return text.slice(0, 170).trim();
    }

    function buildNewsItem(item, category) {
      const { cleanTitle, source } = extractSourceAndTitle(item.title);
      const publicationDate = item.pubDate || item.pubdate || new Date().toISOString();

      return {
        id: item.guid || item.link || `${category.id}-${Math.random().toString(36).slice(2, 11)}`,
        title: cleanTitle,
        excerpt: cleanExcerpt(item.description, cleanTitle, source),
        source,
        url: item.link,
        imageUrl: extractImageUrl(item),
        fallbackImage: createFallbackImage(category.id, category.color),
        category: category.id,
        color: category.color,
        pubDate: publicationDate,
        timeAgo: getTimeAgo(publicationDate),
      };
    }

    async function fetchCategoryNews(category, limit = null) {
      const response = await fetch(`${RSS_TO_JSON_API}${encodeURIComponent(category.query)}`);
      const data = await response.json();

      if (data.status !== 'ok' || !Array.isArray(data.items)) {
        return [];
      }

      const items = limit ? data.items.slice(0, limit) : data.items;
      return items.map((item) => buildNewsItem(item, category));
    }

    function getGreetingLabel(date) {
      return date.getHours() >= 12 ? 'AFTERNOON' : 'MORNING';
    }


    function mapWeatherCodeToCondition(weatherCode = 0) {
      if ([95, 96, 99].includes(weatherCode)) return 'storm';
      if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(weatherCode)) return 'rain';
      if ([1, 2, 3, 45, 48].includes(weatherCode)) return 'cloudy';
      return 'clear';
    }

    function getWeatherIntensity(weatherCode = 0) {
      if ([95, 96, 99].includes(weatherCode)) return 70;
      if ([65, 67, 82].includes(weatherCode)) return 56;
      if ([63, 66, 81].includes(weatherCode)) return 42;
      if ([51, 53, 55, 56, 57, 61, 80].includes(weatherCode)) return 28;
      return 0;
    }

    function createStableRange(length, seed, min, max) {
      return Array.from({ length }, (_, index) => {
        const x = Math.sin(seed * 1000 + index * 9999) * 10000;
        const normalized = x - Math.floor(x);
        return min + normalized * (max - min);
      });
    }

    function useUserWeather(time) {
      const [weatherState, setWeatherState] = useState({
        condition: 'clear',
        intensity: 0,
        isNight: false,
        source: 'fallback',
        locationLabel: 'Local signal',
        temperature: null,
        weatherCode: 0,
      });
      const lastFetchRef = useRef(0);

      const updateNightState = useCallback(() => {
        setWeatherState((previous) => ({
          ...previous,
          isNight: time.getHours() >= 19 || time.getHours() < 6,
        }));
      }, [time]);

      useEffect(() => {
        updateNightState();
      }, [updateNightState]);

      useEffect(() => {
        let isMounted = true;

        async function fetchWeather(latitude, longitude) {
          const response = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&timezone=auto`
          );
          const data = await response.json();
          const current = data.current || {};
          const weatherCode = current.weather_code ?? 0;

          if (!isMounted) return;

          setWeatherState((previous) => ({
            ...previous,
            condition: mapWeatherCodeToCondition(weatherCode),
            intensity: getWeatherIntensity(weatherCode),
            temperature: current.temperature_2m ?? null,
            weatherCode,
            source: 'live',
            locationLabel: 'Live weather',
          }));
        }

        async function resolveWeather() {
          const now = Date.now();
          if (now - lastFetchRef.current < 15 * 60 * 1000) return;
          lastFetchRef.current = now;

          if (!navigator.geolocation) {
            setWeatherState((previous) => ({
              ...previous,
              source: 'fallback',
              locationLabel: 'Browser without geolocation',
            }));
            return;
          }

          navigator.geolocation.getCurrentPosition(
            (position) => {
              fetchWeather(position.coords.latitude, position.coords.longitude).catch(() => {
                if (!isMounted) return;
                setWeatherState((previous) => ({
                  ...previous,
                  source: 'fallback',
                  locationLabel: 'Weather unavailable',
                }));
              });
            },
            () => {
              if (!isMounted) return;
              setWeatherState((previous) => ({
                ...previous,
                source: 'fallback',
                locationLabel: 'Location denied',
              }));
            },
            {
              enableHighAccuracy: false,
              timeout: 8000,
              maximumAge: 15 * 60 * 1000,
            }
          );
        }

        resolveWeather();

        return () => {
          isMounted = false
        };
      }, []);

      return weatherState;
    }

    /* =========================================================
       COMPONENTES DE PRESENTACIÓN
    ========================================================= */
    function Header({ categories, activeCategoryId, onCategoryChange, time }) {
      return (
        <header className="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between border-b border-black/5 bg-white/90 px-6 py-2 text-black backdrop-blur-xl">
          <div className="flex items-center gap-6">
            <h1 className="text-lg font-black uppercase italic tracking-tighter">Astrak</h1>

            <nav className="no-scrollbar flex max-w-[62vw] items-center gap-0.5 overflow-x-auto whitespace-nowrap md:max-w-none" aria-label="Categorías de noticias">
              {categories.map((category) => {
                const isActive = activeCategoryId === category.id;

                return (
                  <button
                    key={category.id}
                    type="button"
                    onClick={() => onCategoryChange(category)}
                    className={`relative z-10 px-2.5 py-1 text-[8px] font-black uppercase tracking-[0.2em] transition-all md:px-3 ${
                      isActive ? 'text-black' : 'text-neutral-400 hover:text-black'
                    }`}
                  >
                    {category.id}
                    {isActive && (
                      <motion.div
                        layoutId="activePill"
                        className="absolute inset-0 z-[-1] rounded-full"
                        style={{ backgroundColor: category.color }}
                      />
                    )}
                  </button>
                );
              })}
            </nav>
          </div>

          <div className="flex items-center gap-4 text-[9px] font-black uppercase tracking-widest opacity-60">
            <span>{getGreetingLabel(time)}</span>
            <span className="h-3 w-px bg-black/10"></span>
            <span>
              {time.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
              })}
            </span>
          </div>
        </header>
      );
    }

    function LoadingScreen() {
      return (
        <div className="flex h-screen items-center justify-center">
          <div className="loader-ring"></div>
        </div>
      );
    }

    function HeroSection({ headline, time, weather }) {
      const [heroImageSrc, setHeroImageSrc] = useState('');

      useEffect(() => {
        if (!headline) return;
        setHeroImageSrc(headline.imageUrl || headline.fallbackImage);
      }, [headline?.id]);

      if (!headline) return null;

      return (
        <motion.section
          key={headline.id}
          initial={{ opacity: 0 }}
          animate={{ opacity: 1 }}
          className="relative flex min-h-[90vh] flex-col justify-end overflow-hidden bg-black px-8 pb-24 pt-40 md:px-16"
        >
          <Atmosphere time={time} weather={weather} />

          <div className="relative z-30 grid grid-cols-1 items-end gap-10 xl:grid-cols-12 xl:gap-12">
            <div className="max-w-4xl xl:col-span-7">
              <span className="mb-4 block text-[10px] font-bold uppercase italic tracking-[0.3em] opacity-40">
                Priority Transmission _
              </span>

              <h2 className="astrak-font-black astrak-leading-tightest astrak-tracking-tightest mb-6 text-4xl uppercase text-white drop-shadow-lg md:text-5xl lg:text-6xl">
                {headline.title}
              </h2>

              <p className="max-w-xl text-sm font-medium italic leading-relaxed text-neutral-300 opacity-80 md:text-base">
                {headline.excerpt}
              </p>
            </div>

            <div className="flex flex-col gap-6 xl:col-span-5 xl:items-end">
              <a
                href={headline.url}
                target="_blank"
                rel="noreferrer"
                className="group relative block w-full overflow-hidden rounded-[28px] border border-white/10 bg-black shadow-[0_20px_80px_rgba(0,0,0,0.55)] xl:max-w-md"
                aria-label={`Abrir noticia: ${headline.title}`}
              >
                <div className="absolute inset-0 z-10 bg-gradient-to-t from-black/78 via-black/28 to-black/10"></div>
                <img
                  src={heroImageSrc}
                  alt={headline.title}
                  className="h-[240px] w-full object-cover opacity-90 transition-transform duration-700 group-hover:scale-[1.03] md:h-[280px]"
                  loading="eager"
                  referrerPolicy="no-referrer"
                  onError={() => setHeroImageSrc(headline.fallbackImage)}
                />
                <div className="absolute inset-x-0 bottom-0 z-20 flex items-end justify-between gap-4 px-5 py-4 text-white">
                  <div className="min-w-0">
                    <div className="mb-1 text-[8px] font-black uppercase tracking-[0.35em] opacity-70">Headline Visual</div>
                    <div className="truncate text-[10px] font-bold uppercase tracking-[0.18em] opacity-90">{headline.source}</div>
                  </div>
                  <div
                    className="shrink-0 px-3 py-1 text-[8px] font-black uppercase tracking-[0.28em]"
                    style={{ backgroundColor: headline.color, color: '#000000' }}
                  >
                    {headline.category}
                  </div>
                </div>
              </a>

              <div className="flex flex-col items-start space-y-6 text-left xl:items-end xl:text-right">
                <div
                  className="px-4 py-1 text-[9px] font-black uppercase tracking-[0.3em]"
                  style={{ backgroundColor: headline.color, color: '#000000' }}
                >
                  {headline.category}
                </div>

                <div className="space-y-1">
                  <div className="text-[10px] font-bold uppercase italic tracking-widest opacity-50">
                    via {headline.source} • {headline.timeAgo}
                  </div>
                  <div className="text-[8px] font-medium uppercase opacity-30">Status: Verified Signal</div>
                </div>

                <a
                  href={headline.url}
                  target="_blank"
                  rel="noreferrer"
                  className="border-b-2 border-white/20 pb-1 text-[10px] font-black uppercase tracking-tighter transition-all hover:border-white"
                >
                  Open Preview ↗
                </a>
              </div>
            </div>
          </div>
        </motion.section>
      );
    }

    function NewsListSection({ news, isLoading }) {
      return (
        <section className="bg-black px-8 py-32 md:px-16">
          <div className="mx-auto max-w-6xl">
            <div className="mb-20 flex items-center gap-4">
              <span className="text-[9px] font-black uppercase tracking-[0.5em] text-neutral-700 italic underline decoration-neutral-800">
                Sequential_Signals
              </span>
              <div className="h-px flex-grow bg-white/[0.05]"></div>
            </div>

            <div className="space-y-24">
              {!isLoading &&
                news.map((item, index) => (
                  <motion.article
                    key={item.id}
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true, margin: '-100px' }}
                    className="group cursor-pointer border-b border-white/[0.02] pb-16"
                    onClick={() => window.open(item.url, '_blank', 'noopener,noreferrer')}
                  >
                    <div className="grid grid-cols-1 items-start gap-12 lg:grid-cols-4">
                      <div className="space-y-5 lg:col-span-3">

        <footer className="border-t border-white/[0.05] bg-black px-8 py-32 text-white md:px-16">

            <div className="space-y-12">
              <h1 className="astrak-font-black astrak-tracking-tightest text-[120px] leading-[0.7] opacity-10 italic md:text-[200px]">
                Astrak
              </h1>

              <div className="max-w-md space-y-6">
                <h4 className="text-[10px] font-black uppercase tracking-[0.3em] opacity-30 italic">
                  Protocol Documentation_
                </h4>
                <p className="text-[12px] italic leading-relaxed text-neutral-600">
                  Astrak es un sintetizador de noticias de alta frecuencia. Los datos son extraídos en tiempo real y la atmósfera del sistema se sincroniza con el horario local.
                </p>
              </div>
            </div>

            <div className="w-full space-y-12 lg:w-96">
              <h4 className="text-4xl font-black uppercase italic tracking-tighter">Signal_Feedback</h4>
              <form className="space-y-8" onSubmit={(event) => event.preventDefault()}>
                <input type="text" placeholder="Operator_ID" className="astrak-field" />
                <input type="email" placeholder="node@astrak.io" className="astrak-field" />
                <button
                  type="submit"
                  className="w-full bg-white py-5 text-[10px] font-black uppercase tracking-[0.4em] text-black transition-all hover:bg-neutral-300 active:scale-95"

    /* =========================================================
       ATMÓSFERA DINÁMICA
    ========================================================= */
    function Atmosphere({ time, weather }) {
      const celestialPosition = useMemo(() => {
        const hourValue = time.getHours() + time.getMinutes() / 60;
        const isDay = hourValue >= 6 && hourValue < 19;
        let progress;

        if (isDay) {
          progress = (hourValue - 6) / 13;
        } else {
          const nightHours = hourValue >= 19 ? hourValue - 19 : hourValue + 5;
          progress = nightHours / 11;
        }

        return {
          x: progress * 100,
          y: 80 - Math.sin(progress * Math.PI) * 60,
          isDay,
        };
      }, [time]);

      const visualSeed = useMemo(() => {
        const hourBucket = `${time.getFullYear()}-${time.getMonth()}-${time.getDate()}-${time.getHours()}`;
        return Array.from(hourBucket).reduce((accumulator, character) => accumulator + character.charCodeAt(0), 0) + (weather?.weatherCode || 0);
      }, [time, weather]);

      const cloudCount = weather?.condition !== 'clear' ? 8 : 0;
      const rainCount = ['rain', 'storm'].includes(weather?.condition) ? weather.intensity : 0;
      const starTop = useMemo(() => createStableRange(50, visualSeed + 1, 0, 100), [visualSeed]);
      const starLeft = useMemo(() => createStableRange(50, visualSeed + 2, 0, 100), [visualSeed]);
      const starSize = useMemo(() => createStableRange(50, visualSeed + 3, 0.4, 1.8), [visualSeed]);
      const cloudWidths = useMemo(() => createStableRange(cloudCount, visualSeed + 4, 300, 800), [cloudCount, visualSeed]);
      const cloudHeights = useMemo(() => createStableRange(cloudCount, visualSeed + 5, 150, 400), [cloudCount, visualSeed]);
      const cloudTops = useMemo(() => createStableRange(cloudCount, visualSeed + 6, 5, 50), [cloudCount, visualSeed]);
      const rainLefts = useMemo(() => createStableRange(rainCount, visualSeed + 7, 0, 110), [rainCount, visualSeed]);
      const rainDelays = useMemo(() => createStableRange(rainCount, visualSeed + 8, 0, 1.5), [rainCount, visualSeed]);

      return (
        <div
          className="absolute inset-0 z-0 transition-all duration-[4000ms] ease-in-out"
          style={{
            background: celestialPosition.isDay
              ? weather?.condition === 'clear'
                ? '#0a1e3b'
                : '#1a2a3a'
              : '#000000',
          }}
        >
          {!celestialPosition.isDay && (
            <div className="absolute inset-0 opacity-30">
              {starTop.map((topValue, index) => (
                <div
                  key={`star-${index}`}
                  className="absolute rounded-full bg-white"
                  style={{
                    width: `${starSize[index]}px`,
                    height: `${starSize[index]}px`,
                    top: `${topValue}%`,
                    left: `${starLeft[index]}%`,
                  }}
                />
              ))}
            </div>
          )}

          <motion.div
            animate={{
              left: `${celestialPosition.x}%`,
              top: `${celestialPosition.y}%`,
            }}
            className={`absolute z-10 rounded-full blur-[60px] ${
              celestialPosition.isDay
                ? 'bg-yellow-100/40 shadow-[0_0_120px_rgba(254,240,138,0.3)]'
                : 'bg-slate-200/20 shadow-[0_0_80px_rgba(241,245,249,0.2)]'
            }`}
            style={{
              width: '120px',
              height: '120px',
              transform: 'translate(-50%, -50%)',
            }}
          />

          {Array.from({ length: cloudCount }).map((_, index) => (
            <div
              key={`cloud-${index}`}
              className="cloud-element"
              style={{
                width: `${cloudWidths[index]}px`,
                height: `${cloudHeights[index]}px`,
                top: `${cloudTops[index]}%`,
                animationDelay: `${index * -12}s`,
                opacity: weather?.condition === 'storm' ? 0.4 : 0.15,
              }}
            />
          ))}

          {Array.from({ length: rainCount }).map((_, index) => (
            <div
              key={`rain-${index}`}
              className="rain-drop"
              style={{
                left: `${rainLefts[index]}%`,
                animationDelay: `${rainDelays[index]}s`,
                opacity: 0.3,
              }}
            />
          ))}

          {weather?.condition === 'storm' && <div className="lightning-effect" />}

          <div className="gradient-vignette absolute inset-0 z-20" />
          <div className="analog-noise" />
        </div>
      );
    }

    /* =========================================================
       APP PRINCIPAL
    ========================================================= */
    function App() {
      const [news, setNews] = useState([]);
      const [headline, setHeadline] = useState(null);
      const [activeCategory, setActiveCategory] = useState(CATEGORIES[0]);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [isLoading, setIsLoading] = useState(true);
            const [headlineImageError, setHeadlineImageError] = useState(false);
      const weather = useUserWeather(currentTime);

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const fetchNewsByCategory = useCallback(async (category) => {
        setIsLoading(true);

        try {
          let items = [];

          if (category.id === 'ALL') {
            const results = await Promise.all(
              FEATURED_CATEGORIES.map((featuredCategory) => fetchCategoryNews(featuredCategory, 5).catch(() => []))
            );

            items = results
              .flat()
              .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
          } else {
            items = await fetchCategoryNews(category);
          }

          if (items.length > 0) {
            setHeadline(items[0]);
            setNews(items.slice(1, 12));
          } else {
            setHeadline(null);
            setNews([]);
          }
        } catch (error) {
          console.error('Signal Lost:', error);
          setHeadline(null);
          setNews([]);
        } finally {
          setIsLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchNewsByCategory(activeCategory);
      }, [activeCategory, fetchNewsByCategory]);

      return (
        <div className="min-h-screen bg-black text-white">
          <Header
            categories={CATEGORIES}
            activeCategoryId={activeCategory.id}
            onCategoryChange={setActiveCategory}
            time={currentTime}
          />

          <main>
            <AnimatePresence mode="wait">
              {isLoading ? (
                <LoadingScreen />
              ) : (
                <HeroSection headline={headline} time={currentTime} weather={weather} />
              )}
            </AnimatePresence>

            <NewsListSection news={news} isLoading={isLoading} />
          </main>

          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
