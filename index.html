<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ASTRAK - Sintetizador de noticias de alta frecuencia en tiempo real">
    <meta name="theme-color" content="#000000">
    
    <title>ASTRAK | High-Frequency Signal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <!-- Librerías Externas -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Cargamos Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/tailwind.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --astrak-bg: #000000;
            --astrak-accent: #ffffff;
            --astrak-muted: #1a1a1a;
        }

        body {
            background-color: var(--astrak-bg);
            color: var(--astrak-accent);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .astrak-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1px;
            background-color: #262626;
            border: 1px solid #262626;
        }

        .astrak-card {
            background-color: black;
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .astrak-card:hover {
            background-color: #0a0a0a;
        }

        .astrak-field {
            width: 100%;
            background: transparent;
            border-bottom: 1px solid #404040;
            padding: 1rem 0;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        .astrak-field:focus {
            border-color: white;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Intentamos obtener Motion de las posibles variables globales
        const getMotion = () => {
            return window.FramerMotion || window.Motion || null;
        };

        const CATEGORIES = [
            { id: 'ALL', label: 'TODOS_LOS_SISTEMAS', query: '' },
            { id: 'TECH', label: 'TECNOLOGÍA', query: 'technology' },
            { id: 'BIZ', label: 'NEGOCIOS', query: 'business' },
            { id: 'SCIENCE', label: 'CIENCIA', query: 'science' },
            { id: 'ENTERTAINMENT', label: 'CULTURA', query: 'entertainment' }
        ];

        const App = () => {
            const [news, setNews] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [time, setTime] = useState(new Date());
            const [motionLib, setMotionLib] = useState(getMotion());

            // Verificar si la librería cargó (en caso de retardo)
            useEffect(() => {
                if (!motionLib) {
                    const checkInterval = setInterval(() => {
                        const lib = getMotion();
                        if (lib) {
                            setMotionLib(lib);
                            clearInterval(checkInterval);
                        }
                    }, 100);
                    return () => clearInterval(checkInterval);
                }
            }, [motionLib]);

            // Reloj de sistema
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Fetch de Noticias
            useEffect(() => {
                const fetchNews = async () => {
                    setLoading(true);
                    try {
                        // Usamos un endpoint público para demostración
                        const response = await fetch(`https://ok.surf/api/v1/cors/news-feed`);
                        const data = await response.json();
                        const items = data.US || data.World || [];
                        setNews(items.slice(0, 12));
                    } catch (error) {
                        console.error("Signal_Error:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchNews();
            }, [activeCategory]);

            if (!motionLib) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center text-[10px] tracking-widest text-white">
                        INICIALIZANDO_SISTEMA_MOTION...
                    </div>
                );
            }

            const { motion, AnimatePresence } = motionLib;

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="p-8 border-b border-neutral-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div className="space-y-1">
                            <h1 className="text-5xl font-black italic tracking-tighter leading-none">ASTRAK_</h1>
                            <p className="text-[10px] tracking-[0.4em] text-neutral-500 uppercase font-bold">High_Frequency_Signal_Sinthetizer</p>
                        </div>
                        
                        <div className="flex flex-col items-end font-mono text-[10px] space-y-1 text-neutral-400">
                            <div>UTC_OFFSET: {new Date().getTimezoneOffset()}</div>
                            <div className="text-white font-bold">{time.toLocaleTimeString('en-GB')}</div>
                            <div className="bg-white text-black px-2 py-0.5">STATUS: ACTIVE</div>
                        </div>
                    </header>

                    <nav className="px-8 py-4 border-b border-neutral-800 overflow-x-auto whitespace-nowrap bg-black sticky top-0 z-50">
                        <div className="flex gap-8">
                            {CATEGORIES.map(cat => (
                                <button
                                    key={cat.id}
                                    onClick={() => setActiveCategory(cat.id)}
                                    className={`text-[10px] font-black tracking-[0.3em] uppercase transition-all ${
                                        activeCategory === cat.id ? 'text-white underline underline-offset-8' : 'text-neutral-600 hover:text-neutral-400'
                                    }`}
                                >
                                    {cat.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="flex-grow">
                        {loading ? (
                            <div className="h-96 flex items-center justify-center">
                                <div className="text-[10px] tracking-[1em] animate-pulse uppercase">Sincronizando_Nodos...</div>
                            </div>
                        ) : (
                            <div className="astrak-grid">
                                <AnimatePresence mode="popLayout">
                                    {news.map((item, index) => (
                                        <motion.div
                                            key={`node-${index}-${item.title.substring(0, 5)}`}
                                            initial={{ opacity: 0, y: 10 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0 }}
                                            transition={{ duration: 0.3, delay: index * 0.05 }}
                                            className="astrak-card"
                                        >
                                            <div className="flex justify-between items-start mb-6">
                                                <span className="text-[9px] font-bold bg-neutral-900 px-2 py-1 tracking-widest uppercase">
                                                    {item.source || 'GLOBAL_NET'}
                                                </span>
                                                <span className="text-[9px] text-neutral-600 font-mono">
                                                    NODE_{index.toString().padStart(3, '0')}
                                                </span>
                                            </div>
                                            
                                            <h3 className="text-xl font-bold leading-tight mb-4 tracking-tight">
                                                <a href={item.link} target="_blank" rel="noopener noreferrer" className="hover:text-neutral-400 transition-colors">
                                                    {item.title}
                                                </a>
                                            </h3>
                                            
                                            <div className="mt-auto pt-6 flex justify-between items-center">
                                                <div className="h-px flex-grow bg-neutral-800 mr-4"></div>
                                                <a 
                                                    href={item.link} 
                                                    target="_blank"
                                                    className="text-[10px] font-black uppercase tracking-tighter hover:bg-white hover:text-black px-3 py-1 transition-colors"
                                                >
                                                    Leer_Mas+
                                                </a>
                                            </div>
                                        </motion.div>
                                    ))}
                                </AnimatePresence>
                            </div>
                        )}
                    </main>

                    <footer className="p-12 border-t border-neutral-800 bg-black">
                        <div className="flex flex-col lg:flex-row justify-between gap-16">
                            <div className="max-w-md space-y-6">
                                <h2 className="text-3xl font-black italic tracking-tighter">ASTRAK_CORE</h2>
                                <p className="text-[11px] text-neutral-500 leading-relaxed uppercase tracking-wider">
                                    Terminal de monitoreo de eventos globales. Procesamiento de datos crudos sin filtros editoriales. 
                                </p>
                            </div>
                            
                            <div className="w-full lg:w-96 space-y-8">
                                <h4 className="text-[10px] font-black tracking-[0.4em] uppercase text-neutral-400">Suscribirse_Al_Feed</h4>
                                <div className="space-y-4">
                                    <input type="email" placeholder="NODE@DOMAIN.COM" className="astrak-field" />
                                    <button className="w-full py-4 bg-white text-black font-black uppercase text-[10px] tracking-[0.4em] hover:bg-neutral-300 transition-all">
                                        Registrar_Operador
                                    </button>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
