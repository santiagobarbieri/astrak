<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20fill%3D%27white%27/%3E%3Ccircle%20cx%3D%2732%27%20cy%3D%2732%27%20r%3D%2714%27%20fill%3D%27black%27%20opacity%3D%270.9%27/%3E%3C/svg%3E" />
  <title>ASTRAK</title>

  <!-- Dependencias -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

    :root {
      --astrak-black: #ffffff;
      --astrak-white: #000000;
      --astrak-accent: #e2ff00;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: #fff; }
    body {
      margin: 0;
      overflow-x: hidden;
      background-color: var(--astrak-black);
      color: var(--astrak-white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animaciones Atmosféricas */
    @keyframes rain-fall { 0% { transform: translateY(-120vh) rotate(15deg); } 100% { transform: translateY(120vh) rotate(15deg); } }
    @keyframes lightning-bolt { 
      0%, 94%, 100% { opacity: 0; } 
      95% { opacity: 1; background: #ffffff; }
      96% { opacity: 0.3; } 
      97% { opacity: 0.9; background: #f0f9ff; }
    }
    @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
    @keyframes celestial-float { 0%, 100% { transform: translate3d(0, 0, 0) scale(1); } 50% { transform: translate3d(-6px, 5px, 0) scale(1.025); } }
    @keyframes cloud-drift { 0% { transform: translate3d(-4%, 0, 0); } 100% { transform: translate3d(4%, 0, 0); } }

    .rain-drop {
      position: absolute;
      z-index: 13;
      width: var(--rain-width);
      height: var(--rain-length);
      background: linear-gradient(transparent, var(--rain-color));
      box-shadow: 0 0 12px var(--rain-glow);
      animation: rain-fall var(--rain-speed) linear infinite;
      pointer-events: none;
    }
    .lightning-effect { position: absolute; inset: 0; z-index: 5; pointer-events: none; animation: lightning-bolt 10s ease-in-out infinite; }
    .analog-noise { position: absolute; inset: 0; z-index: 20; pointer-events: none; opacity: 0.055; mix-blend-mode: screen; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.03), transparent); animation: scanline 10s linear infinite; z-index: 21; pointer-events: none; }

    .atmosphere-base {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 18%, var(--sky-glow), transparent 22%),
        radial-gradient(ellipse at 82% 16%, var(--weather-rim), transparent 34%),
        radial-gradient(ellipse at 50% 92%, var(--horizon-glow), transparent 42%),
        linear-gradient(160deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-bottom) 100%);
    }

    .atmosphere-base::before,
    .atmosphere-base::after {
      content: "";
      position: absolute;
      inset: -18%;
      pointer-events: none;
    }

    .atmosphere-base::before {
      z-index: 1;
      opacity: 0.72;
      mix-blend-mode: screen;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.12), transparent 28%),
        radial-gradient(ellipse at 78% 34%, var(--cloud-glow), transparent 32%),
        radial-gradient(ellipse at 24% 78%, var(--storm-glow), transparent 38%);
    }

    .atmosphere-base.cloudy::before,
    .atmosphere-base.storm::before,
    .atmosphere-base.electric::before {
      opacity: 0.92;
    }

    .atmosphere-base::after {
      z-index: 2;
      opacity: 0.68;
      background:
        linear-gradient(90deg, var(--horizon-sheen), transparent 28%, rgba(255,255,255,0.05) 72%, transparent),
        radial-gradient(circle at 50% 55%, var(--air-haze), transparent 44%);
    }

    .star-field {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: var(--star-opacity);
      background-image:
        radial-gradient(circle at 12% 20%, rgba(255,255,255,0.75) 0 1px, transparent 1.5px),
        radial-gradient(circle at 28% 12%, rgba(255,255,255,0.5) 0 1px, transparent 1.5px),
        radial-gradient(circle at 44% 24%, rgba(255,255,255,0.7) 0 1px, transparent 1.5px),
        radial-gradient(circle at 68% 16%, rgba(255,255,255,0.56) 0 1px, transparent 1.5px),
        radial-gradient(circle at 82% 32%, rgba(255,255,255,0.74) 0 1px, transparent 1.5px),
        radial-gradient(circle at 18% 46%, rgba(255,255,255,0.48) 0 1px, transparent 1.5px),
        radial-gradient(circle at 58% 42%, rgba(255,255,255,0.52) 0 1px, transparent 1.5px),
        radial-gradient(circle at 90% 58%, rgba(255,255,255,0.44) 0 1px, transparent 1.5px);
    }

    .cloud-layer {
      position: absolute;
      inset: -10% -12%;
      z-index: 3;
      pointer-events: none;
      opacity: var(--cloud-opacity);
      filter: blur(18px);
      mix-blend-mode: screen;
      animation: cloud-drift 26s ease-in-out infinite alternate;
      background:
        radial-gradient(ellipse at 18% 30%, var(--cloud-core), transparent 28%),
        radial-gradient(ellipse at 42% 22%, var(--cloud-core), transparent 24%),
        radial-gradient(ellipse at 72% 34%, var(--cloud-core), transparent 30%),
        radial-gradient(ellipse at 88% 12%, var(--cloud-edge), transparent 26%),
        linear-gradient(180deg, transparent 0%, var(--cloud-shadow) 72%, transparent 100%);
    }

    .rain-curtain {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      opacity: var(--rain-curtain-opacity);
      mix-blend-mode: screen;
      background:
        repeating-linear-gradient(104deg, transparent 0 18px, var(--rain-curtain-color) 19px 20px, transparent 21px 42px);
      filter: blur(0.4px);
    }

    .cloud-layer.back {
      z-index: 1;
      opacity: var(--cloud-back-opacity);
      filter: blur(32px);
      animation-duration: 38s;
      background:
        radial-gradient(ellipse at 26% 18%, var(--cloud-edge), transparent 30%),
        radial-gradient(ellipse at 66% 26%, var(--cloud-core), transparent 36%),
        radial-gradient(ellipse at 52% 70%, var(--cloud-shadow), transparent 34%);
    }

    .celestial-body {
      position: absolute;
      top: var(--celestial-top);
      left: var(--celestial-left);
      z-index: 4;
      width: clamp(3rem, 6.5vw, 5.5rem);
      height: clamp(3rem, 6.5vw, 5.5rem);
      border-radius: 999px;
      pointer-events: none;
      animation: celestial-float 11s ease-in-out infinite;
      opacity: var(--celestial-opacity);
    }

    .celestial-body.sun {
      background:
        radial-gradient(circle at 36% 32%, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0.28) 12%, transparent 26%),
        radial-gradient(circle, rgba(255,231,128,0.78) 0%, rgba(255,122,77,0.42) 42%, rgba(255,122,77,0) 72%);
      box-shadow:
        0 0 36px rgba(255, 214, 102, 0),
        0 0 110px rgba(255,122,77,0.16);
      mix-blend-mode: screen;
    }

    .celestial-body.moon {
      background:
        radial-gradient(circle at 38% 34%, rgba(255,255,255,0.88) 0%, rgba(226,232,240,0.68) 42%, rgba(148,163,184,0.12) 72%);
      box-shadow:
        0 0 28px rgba(255,255,255,0.18),
        0 0 90px rgba(120,160,255,0.12);
      mix-blend-mode: screen;
    }

    .celestial-body.moon::after {
      content: "";
      position: absolute;
      top: -8%;
      left: 28%;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: var(--sky-top);
      box-shadow: -8px 6px 24px rgba(0,0,0,0.12);
    }

    .weather-halo {
      position: absolute;
      inset: 5% 8% auto auto;
      z-index: 3;
      width: min(58vw, 720px);
      height: min(58vw, 720px);
      border-radius: 999px;
      pointer-events: none;
      mix-blend-mode: screen;
      background:
        radial-gradient(circle, var(--weather-halo-core) 0%, var(--weather-halo-edge) 36%, transparent 70%);
    }

    .atmosphere-day-wash {
      position: absolute;
      inset: 0;
      z-index: 14;
      pointer-events: none;
      background:
        linear-gradient(115deg, var(--day-wash) 0%, transparent 36%),
        radial-gradient(ellipse at 28% 18%, var(--air-haze), transparent 32%);
    }

    .hero-depth-gradient { 
      position: absolute;
      inset: 0;
      z-index: 15;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.02) 0%, transparent 28%, rgba(0,0,0,0.34) 62%, rgba(0,0,0,0.42) 78%, rgba(255,255,255,0.1) 91%),
        radial-gradient(ellipse at 18% 74%, rgba(0,0,0,0.46), transparent 38%),
        radial-gradient(ellipse at 20% 88%, rgba(0, 0, 0, 0.16), transparent 46%);
    }

    .news-transition {
      position: relative;
      z-index: 40;
      margin-top: 0;
      min-height: 100vh;
      background: #fff;
    }

    .headline-stage {
      position: relative;
      min-height: 165vh;
    }

    .headline-pin {
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .headline-content {
      text-shadow: 0 2px 24px rgba(0,0,0,0.48), 0 1px 2px rgba(0,0,0,0.22);
    }

    .headline-content::before {
      content: "";
      position: absolute;
      inset: -2rem -2.5rem -2.4rem;
      z-index: -1;
      pointer-events: none;
      border-radius: 48px;
      filter: blur(18px);
    }

    .astrak-font-black { font-weight: 900; }
    .astrak-leading-tightest { line-height: 1.05; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const MotionLib = window.FramerMotion || window.Motion;
    const { motion, AnimatePresence } = MotionLib;

    const RSS_TO_JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

    const WEATHER_LABELS = {
      clear: 'Despejado',
      cloudy: 'Nublado',
      storm: 'Tormenta',
      electric: 'Tormenta eléctrica'
    };

    const PERIOD_LABELS = {
      dawn: 'Amanecer',
      day: 'Día',
      dusk: 'Atardecer',
      night: 'Noche'
    };

    const CATEGORIES = [
      { id: 'ALL', name: 'Global', color: '#e2ff00' },
      { id: 'POLITICS', name: 'Política', color: '#4dabff', query: 'https://news.google.com/rss/headlines/section/topic/POLITICS?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'TECH', name: 'Tecnología', color: '#c084fc', query: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=es-419&gl=AR&ceid=AR:es-419' },
      {
        id: 'ENTERTAINMENT',
        name: 'Cine/Música',
        color: '#ff7a4d',
        queries: [
          'https://news.google.com/rss/search?q=peliculas%20internacionales%20OR%20Hollywood%20OR%20Oscars%20OR%20Cannes%20OR%20streaming&hl=es-419&gl=US&ceid=US:es-419',
          'https://news.google.com/rss/search?q=musica%20popular%20OR%20pop%20OR%20album%20OR%20tour%20OR%20Billboard&hl=es-419&gl=US&ceid=US:es-419'
        ]
      },
      { id: 'ECONOMY', name: 'Economía', color: '#34d399', query: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'WORLD', name: 'Internacional', color: '#fbbf24', query: 'https://news.google.com/rss/headlines/section/topic/WORLD?hl=es-419&gl=AR&ceid=AR:es-419' },
      { id: 'CULTURE', name: 'Cultura', color: '#f472b6', query: 'https://news.google.com/rss/search?q=cultura%20arte%20literatura%20Argentina&hl=es-419&gl=AR&ceid=AR:es-419' },
    ];

    const AstrakLogo = ({ className }) => (
      <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="white"/>
        <circle cx="50" cy="50" r="22" stroke="black" strokeWidth="12"/>
        <circle cx="50" cy="50" r="6" fill="black"/>
      </svg>
    );

    const LoadingScreen = () => (
      <div className="fixed inset-0 z-[300] bg-white flex flex-col items-center justify-center">
        <AstrakLogo className="w-12 h-12 mb-8 animate-pulse" />
        <motion.span 
          animate={{ opacity: [0.3, 1, 0.3] }}
          transition={{ duration: 1.5, repeat: Infinity }}
          className="text-[10px] font-black uppercase"
        >
          Protocolo Inicial _
        </motion.span>
      </div>
    );

    const getWeatherState = (date = new Date()) => {
      const hour = date.getHours() + date.getMinutes() / 60;
      const daySeed = date.getDate() + date.getMonth() + Math.floor(hour / 4);
      const conditions = ['cloudy', 'storm', 'cloudy', 'electric', 'cloudy', 'storm'];
      const condition = conditions[daySeed % conditions.length];
      const period = hour >= 5 && hour < 7.5
        ? 'dawn'
        : hour >= 17.25 && hour < 20
          ? 'dusk'
          : hour >= 7.5 && hour < 17.25
            ? 'day'
            : 'night';
      const isNight = period === 'night';
      const isStorm = condition === 'storm' || condition === 'electric';
      const intensity = condition === 'electric'
        ? 118
        : condition === 'storm'
          ? 92
          : condition === 'cloudy'
            ? 48
            : 0;
      const progress = isNight
        ? ((hour >= 20 ? hour - 20 : hour + 4) / 9)
        : ((hour - 5) / 15);
      const clampedProgress = Math.min(1, Math.max(0, progress));

      return {
        condition,
        period,
        intensity,
        isNight,
        isStorm,
        celestialLeft: `${12 + clampedProgress * 68}%`,
        celestialTop: `${18 + Math.sin(clampedProgress * Math.PI) * -11 + Math.abs(clampedProgress - 0.5) * 18}%`
      };
    };

    const Atmosphere = ({ weather }) => {
      const drops = useMemo(() => Array.from({ length: weather.intensity }, () => ({
        left: `${Math.random() * 100}%`,
        top: `-${Math.random() * 20}%`,
        animationDelay: `${Math.random() * 2}s`,
        opacity: Math.random() * 0.5
      })), [weather.intensity]);
      const periodTheme = {
        dawn: {
          '--sky-top': '#111827',
          '--sky-mid': '#31516a',
          '--sky-bottom': '#f8dca6',
          '--sky-glow': 'rgba(255,213,128,0.32)',
          '--weather-rim': 'rgba(255,178,102,0.22)',
          '--horizon-glow': 'rgba(255,214,153,0.42)',
          '--cloud-glow': 'rgba(255,238,210,0.28)',
          '--storm-glow': 'rgba(120,160,255,0.1)',
          '--horizon-sheen': 'rgba(255,255,255,0.24)',
          '--air-haze': 'rgba(255,244,224,0.22)',
          '--day-wash': 'rgba(255,255,255,0.18)',
          '--weather-halo-core': 'rgba(255,218,145,0.42)',
          '--weather-halo-edge': 'rgba(255,149,92,0.14)',
          '--star-opacity': 0.12,
          '--rain-color': 'rgba(255,255,255,0.36)'
        },
        day: {
          '--sky-top': '#0d111a',
          '--sky-mid': '#243449',
          '--sky-bottom': '#f5f0dd',
          '--sky-glow': 'rgba(255,231,128,0.26)',
          '--weather-rim': 'rgba(255,231,128,0.22)',
          '--horizon-glow': 'rgba(255,255,255,0.34)',
          '--cloud-glow': 'rgba(255,244,214,0.24)',
          '--storm-glow': 'rgba(77,171,255,0.13)',
          '--horizon-sheen': 'rgba(255,255,255,0.22)',
          '--air-haze': 'rgba(255,255,255,0.2)',
          '--day-wash': 'rgba(255,255,255,0.2)',
          '--weather-halo-core': 'rgba(255,231,128,0.5)',
          '--weather-halo-edge': 'rgba(255,122,77,0.18)',
          '--star-opacity': 0,
          '--rain-color': 'rgba(255,255,255,0.38)'
        },
        dusk: {
          '--sky-top': '#140f1d',
          '--sky-mid': '#63314a',
          '--sky-bottom': '#ffb15f',
          '--sky-glow': 'rgba(255,145,77,0.34)',
          '--weather-rim': 'rgba(255,122,77,0.28)',
          '--horizon-glow': 'rgba(255,149,79,0.46)',
          '--cloud-glow': 'rgba(255,188,128,0.3)',
          '--storm-glow': 'rgba(192,132,252,0.12)',
          '--horizon-sheen': 'rgba(255,214,170,0.26)',
          '--air-haze': 'rgba(255,205,150,0.22)',
          '--day-wash': 'rgba(255,190,120,0.18)',
          '--weather-halo-core': 'rgba(255,149,79,0.48)',
          '--weather-halo-edge': 'rgba(192,132,252,0.18)',
          '--star-opacity': 0.16,
          '--rain-color': 'rgba(255,235,210,0.4)'
        },
        night: {
          '--sky-top': '#000000',
          '--sky-mid': '#070a12',
          '--sky-bottom': '#101827',
          '--sky-glow': 'rgba(180,205,255,0.16)',
          '--weather-rim': 'rgba(77,171,255,0.18)',
          '--horizon-glow': 'rgba(77,171,255,0.12)',
          '--cloud-glow': 'rgba(120,160,255,0.14)',
          '--storm-glow': 'rgba(255,255,255,0.07)',
          '--horizon-sheen': 'rgba(255,255,255,0.08)',
          '--air-haze': 'rgba(255,255,255,0.11)',
          '--day-wash': 'rgba(255,255,255,0.08)',
          '--weather-halo-core': 'rgba(220,235,255,0.42)',
          '--weather-halo-edge': 'rgba(90,130,255,0.14)',
          '--star-opacity': weather.condition === 'clear' ? 0.72 : 0.28,
          '--rain-color': 'rgba(255,255,255,0.42)'
        }
      };
      const cloudOpacity = weather.condition === 'clear'
        ? 0.08
        : weather.condition === 'cloudy'
          ? 0.46
          : 0.66;
      const skyTheme = {
        ...periodTheme[weather.period],
        '--cloud-opacity': `${cloudOpacity}`,
        '--cloud-back-opacity': `${cloudOpacity * 0.58}`,
        '--cloud-core': weather.isStorm ? 'rgba(86,104,130,0.38)' : 'rgba(255,255,255,0.24)',
        '--cloud-edge': weather.isStorm ? 'rgba(30,41,59,0.34)' : 'rgba(255,255,255,0.16)',
        '--cloud-shadow': weather.isStorm ? 'rgba(0,0,0,0.28)' : 'rgba(255,255,255,0.08)',
        '--rain-width': weather.condition === 'cloudy' ? '1.2px' : '1.8px',
        '--rain-length': weather.condition === 'cloudy' ? '130px' : '190px',
        '--rain-speed': weather.condition === 'electric' ? '0.48s' : weather.condition === 'storm' ? '0.56s' : '0.82s',
        '--rain-glow': weather.isStorm ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.16)',
        '--rain-curtain-opacity': weather.condition === 'cloudy' ? '0.16' : weather.isStorm ? '0.3' : '0',
        '--rain-curtain-color': weather.isStorm ? 'rgba(255,255,255,0.09)' : 'rgba(255,255,255,0.055)',
        '--celestial-left': weather.celestialLeft,
        '--celestial-top': weather.celestialTop,
        '--celestial-opacity': weather.condition === 'cloudy' ? 0.34 : weather.isStorm ? 0.2 : 0.48
      };

      return (
        <div
          className={`atmosphere-base ${weather.condition} transition-colors duration-[3000ms]`}
          style={skyTheme}
        >
          <div className="star-field" />
          <div className="cloud-layer back" />
          <div className="cloud-layer" />
          <div className="weather-halo" />
          <div className={`celestial-body ${weather.isNight ? 'moon' : 'sun'}`} />
          <div className="atmosphere-day-wash" />
          <div className="lightning-effect" style={{ display: weather.condition === 'electric' ? 'block' : 'none' }} />
          <div className="rain-curtain" />
          {drops.map((drop, i) => (
            <div key={i} className="rain-drop" style={drop} />
          ))}
          <div className="hero-depth-gradient" />
          <div className="scanline" />
          <div className="analog-noise" />
        </div>
      );
    };

    const Header = ({ activeId, onSelect, time }) => {
      const [isOpen, setIsOpen] = useState(false);
      const activeCat = CATEGORIES.find(c => c.id === activeId);

      return (
        <>
          <header className="fixed top-0 left-0 right-0 z-[100] border-b border-black/10 bg-white px-6 py-2.5 flex items-center justify-between">
            <div className="flex items-center gap-8">
              <div 
                className="cursor-pointer flex items-center gap-3 group"
                onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}
              >
                <AstrakLogo className="w-7 h-7 transition-transform group-hover:scale-110" />
                <span className="hidden sm:block text-[9px] font-black uppercase text-black/50">ASTRAK - VERSION 5.0</span>
              </div>
              
              <nav className="hidden lg:flex gap-1 items-center bg-black/5 p-1 rounded-full border border-black/5 overflow-x-auto no-scrollbar max-w-[60vw]">
                {CATEGORIES.map(cat => (
                  <button 
                    key={cat.id} 
                    onClick={() => onSelect(cat)}
                    className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all whitespace-nowrap ${activeId === cat.id ? 'bg-black text-white' : 'text-neutral-600 hover:text-black hover:bg-black/5'}`}
                  >
                    {cat.name}
                  </button>
                ))}
              </nav>

              <button 
                onClick={() => setIsOpen(true)}
                className="lg:hidden flex items-center gap-3 px-4 py-1.5 rounded-full border border-black/10 bg-black/5"
              >
                <div className="w-1.5 h-1.5 rounded-full animate-pulse" style={{backgroundColor: activeCat.color}} />
                <span className="text-[10px] font-black uppercase">{activeCat.name}</span>
              </button>
            </div>
            
            <div className="text-[10px] font-black text-black/70 uppercase bg-black/10 px-3 py-1 rounded">
              {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
            </div>
          </header>

          <AnimatePresence>
            {isOpen && (
              <motion.div 
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                className="fixed inset-0 z-[200] bg-white/98 backdrop-blur-3xl p-8 flex flex-col"
              >
                <div className="flex justify-between items-center mb-16">
                  <span className="text-[10px] font-black uppercase text-black/30">Protocol Selector</span>
                  <button onClick={() => setIsOpen(false)} className="w-10 h-10 flex items-center justify-center rounded-full border border-black/10 text-xl font-light">&times;</button>
                </div>
                <div className="flex-1 flex flex-col justify-center gap-3 overflow-y-auto no-scrollbar">
                  {CATEGORIES.map((cat, idx) => (
                    <button
                      key={cat.id}
                      onClick={() => { onSelect(cat); setIsOpen(false); }}
                      className={`text-left py-4 border-b border-black/5 flex items-center justify-between group transition-all ${activeId === cat.id ? 'opacity-100' : 'opacity-40'}`}
                    >
                      <h2 className="text-3xl font-black uppercase italic" style={activeId === cat.id ? { color: cat.color } : {}}>
                        {cat.name}
                      </h2>
                      {activeId === cat.id && <motion.div layoutId="m-active" className="h-0.5 w-10" style={{ backgroundColor: cat.color }} />}
                    </button>
                  ))}
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    }

    function App() {
      const [news, setNews] = useState([]);
      const [headline, setHeadline] = useState(null);
      const [activeCat, setActiveCat] = useState(CATEGORIES[0]);
      const [time, setTime] = useState(new Date());
      const [loading, setLoading] = useState(true);
      const [weather, setWeather] = useState(() => getWeatherState());
      const requestSeq = useRef(0);

      useEffect(() => {
        const timer = setInterval(() => {
          setTime(new Date());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const requestId = requestSeq.current + 1;
        requestSeq.current = requestId;
        const controller = new AbortController();

        setLoading(true);
        const load = async () => {
          try {
            let results = [];
            const getQueries = (cat) => cat.queries || (cat.query ? [cat.query] : []);
            const interleave = (groups) => {
              const mixed = [];
              const maxLength = Math.max(0, ...groups.map(group => group.length));

              for (let i = 0; i < maxLength; i++) {
                groups.forEach(group => {
                  if (group[i]) mixed.push(group[i]);
                });
              }

              return mixed;
            };
            const dedupeItems = (items) => {
              const seen = new Set();
              return items.filter(item => {
                const key = item.id || item.url || item.title;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
              });
            };
            const latestItemTime = (items) => {
              const time = items[0]?.pubDate ? new Date(items[0].pubDate).getTime() : 0;
              return Number.isFinite(time) ? time : 0;
            };
            const buildItem = (item, cat) => {
              const parts = (item.title || '').split(' - ');
              const publishedAt = item.pubDate ? new Date(item.pubDate) : new Date();
              return {
                id: item.guid || item.link,
                title: parts[0]?.trim() || 'Sin título',
                source: parts[parts.length - 1]?.trim() || 'Desconocido',
                excerpt: `${item.description?.replace(/<[^>]*>?/gm, ' ').slice(0, 150) || 'Sin resumen disponible'}...`,
                url: item.link,
                color: cat.color,
                category: cat.name,
                pubDate: item.pubDate,
                timeAgo: (() => {
                  const d = Date.now() - publishedAt.getTime();
                  if (!Number.isFinite(d)) return 'Ahora';
                  const m = Math.max(0, Math.floor(d / 60000));
                  if (m < 60) return `${m}m`;
                  const h = Math.floor(m / 60);
                  if (h < 24) return `${h}h`;
                  return `${Math.floor(h / 24)}d`;
                })()
              };
            };
            const fetchCategory = async (cat) => {
              const queryResults = await Promise.all(getQueries(cat).map(async (query) => {
                try {
                  const res = await fetch(`${RSS_TO_JSON_API}${encodeURIComponent(query)}`, { signal: controller.signal });
                  if (!res.ok) throw new Error(`rss status ${res.status}`);
                  const data = await res.json();
                  return Array.isArray(data.items)
                    ? data.items.map(item => buildItem(item, cat))
                    : [];
                } catch (e) {
                  if (e.name === 'AbortError') throw e;
                  console.error(e);
                  return [];
                }
              }));

              return dedupeItems(interleave(queryResults));
            };

            if (activeCat.id === 'ALL') {
              const sourceCategories = CATEGORIES.filter(cat => cat.id !== 'ALL');
              const categoryResults = await Promise.all(sourceCategories.map(fetchCategory));
              const latestFirst = [...categoryResults].sort((a, b) => latestItemTime(b) - latestItemTime(a));
              results = dedupeItems(interleave(latestFirst));
            } else {
              results = await fetchCategory(activeCat);
            }

            if (requestSeq.current !== requestId) return;

            setHeadline(results[0]);
            setNews(results.slice(1, 16));
          } catch(e) {
            if (e.name !== 'AbortError') {
              console.error(e);
              if (requestSeq.current === requestId) {
                setHeadline(null);
                setNews([]);
              }
            }
          } finally {
            if (requestSeq.current === requestId) {
              setLoading(false);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          }
        };
        load();

        return () => controller.abort();
      }, [activeCat]);

      return (
        <div className="min-h-screen bg-white text-black selection:bg-black selection:text-white">
          <Header activeId={activeCat.id} onSelect={setActiveCat} time={time} />
          
          <main>
            <AnimatePresence mode="wait">
              {loading ? (
                <LoadingScreen key="loader" />
              ) : (
                <motion.div key={activeCat.id} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                  
                  {headline && (
                    <section className="headline-stage">
                      <div className="headline-pin z-0 flex flex-col justify-end px-6 md:px-16 pb-28 overflow-hidden text-white">
                        <Atmosphere weather={weather} />

                        <div className="headline-content relative z-30 max-w-3xl">
                          <motion.div
                            initial={{ y: 40, opacity: 0 }}
                            animate={{ y: 0, opacity: 1 }}
                            transition={{ duration: 0.8, ease: "easeOut" }}
                          >
                            <div className="flex items-center gap-4 mb-10">
                              <div className="px-2.5 py-0.5 border border-white/20 text-[8px] font-black uppercase bg-white/5">Señal {activeCat.id}</div>
                              <div className="w-2 h-2 rounded-full shadow-[0_0_8px_rgba(255,255,255,0.4)] animate-pulse" style={{ backgroundColor: headline.color }} />
                              <span className="text-[10px] font-black uppercase text-white/60">{headline.category}</span>
                              <span className="hidden sm:inline-flex text-[8px] font-black uppercase text-white/35 tracking-[0.18em]">
                                {PERIOD_LABELS[weather.period]} / {WEATHER_LABELS[weather.condition]}
                              </span>
                            </div>

                            <h2 className="astrak-font-black text-3xl md:text-3xl lg:text-4xl uppercase astrak-leading-tightest mb-10">
                              {headline.title}
                            </h2>

                            <div className="flex items-center gap-8">
                              <div className="flex flex-col">
                                <span className="text-[8px] font-black uppercase text-white/30 mb-1">Origen</span>
                                <span className="text-[10px] font-bold uppercase text-white/80">{headline.source}</span>
                              </div>
                              <div className="flex flex-col">
                                <span className="text-[8px] font-black uppercase text-white/30 mb-1">Sincronización</span>
                                <span className="text-[10px] font-bold uppercase text-white/80">Hace {headline.timeAgo}</span>
                              </div>
                              <a href={headline.url} target="_blank" className="ml-4 p-3 rounded-full border border-white/10 hover:bg-white hover:text-black transition-all">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                              </a>
                            </div>
                          </motion.div>
                        </div>

                        <div className="absolute right-8 bottom-20 hidden md:block opacity-30">
                          <div className="text-[8px] font-black uppercase origin-right rotate-90 whitespace-nowrap translate-y-full">
                            {activeCat.id} // TRANSMISSION ACTIVE
                          </div>
                        </div>
                      </div>
                    </section>
                  )}

                  <section className="news-transition px-6 md:px-16 pt-24 pb-20">
                    <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16">
                      {news.map((item, i) => (
                        <motion.article 
                          key={item.id + i} 
                          initial={{ opacity: 0, y: 20 }} 
                          whileInView={{ opacity: 1, y: 0 }}
                          viewport={{ once: true, margin: "-50px" }}
                          transition={{ delay: (i % 3) * 0.1 }}
                          className="group cursor-pointer border-t border-black/10 pt-10"
                          onClick={() => window.open(item.url, '_blank')}
                        >
                          <div className="flex items-center justify-between mb-5">
                            <span className="text-[9px] font-black uppercase px-2 py-0.5 rounded-sm bg-black/5" style={{color: item.color}}>{item.category}</span>
                            <span className="text-[9px] font-bold text-black/20 uppercase">{item.timeAgo}</span>
                          </div>
                          
                          <h3 className="text-xl font-black uppercase leading-[1.2] mb-5 group-hover:text-black/70 transition-colors">
                            {item.title}
                          </h3>
                          
                          <p className="text-[12px] leading-relaxed text-neutral-600 font-medium italic line-clamp-3 opacity-60 group-hover:opacity-100 transition-opacity">
                            {item.excerpt}
                          </p>
                          
                          <div className="mt-6 text-[9px] font-black uppercase text-black/20 group-hover:text-black transition-colors">
                            Leer Despacho →
                          </div>
                        </motion.article>
                      ))}
                    </div>
                  </section>
                </motion.div>
              )}
            </AnimatePresence>
          </main>

          <footer className="px-6 md:px-16 py-24 border-t border-black/5 bg-white flex flex-col md:flex-row justify-between items-center gap-10 opacity-30 hover:opacity-100 transition-opacity duration-700">
            <div className="flex flex-col items-center md:items-start gap-4">
              <AstrakLogo className="w-10 h-10 grayscale" />
              <span className="text-[8px] font-black uppercase">Terminal V.4.0.2</span>
            </div>
            <div className="flex gap-8 text-[9px] font-black uppercase text-black/50">
              <a href="about.html" className="hover:text-black">About</a>
              <a href="contact.html" className="hover:text-black">Contact</a>
              <a href="#" className="hover:text-black">Home</a>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
